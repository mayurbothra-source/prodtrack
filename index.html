const SB_H = {"apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`,"Content-Type":"application/json"};

function xhrRequest(method, url, headers, body) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open(method, url, true);
    Object.entries(headers).forEach(([k,v]) => xhr.setRequestHeader(k, v));
    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        try { resolve(JSON.parse(xhr.responseText)); }
        catch(e) { resolve([]); }
      } else {
        reject(new Error(xhr.status + ": " + xhr.responseText));
      }
    };
    xhr.onerror = () => reject(new Error("Network error — cannot reach database. Check internet connection."));
    xhr.ontimeout = () => reject(new Error("Request timed out."));
    xhr.timeout = 10000;
    xhr.send(body || null);
  });
}

async function sbGet(table, qs="") {
  return xhrRequest("GET", `${SUPA_URL}/rest/v1/${table}?${qs}`, SB_H, null);
}
async function sbUpsert(table, data) {
  const headers = {...SB_H, "Prefer":"resolution=merge-duplicates,return=representation"};
  return xhrRequest("POST", `${SUPA_URL}/rest/v1/${table}`, headers, JSON.stringify(Array.isArray(data)?data:[data]));
}
async function sbDelete(table, id) {
  return xhrRequest("DELETE", `${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, SB_H, null);
}

// Data mappers: Supabase snake_case → JS camelCase

const mapDT = r => ({id:r.id,machineId:r.machine_id,section:r.section,startTime:r.start_time,description:r.description,category:r.category,supervisorNotified:r.supervisor_notified,maintenanceResponseMins:r.maintenance_response_mins,resolved:r.resolved,resolvedAt:r.resolved_at,loggedBy:r.logged_by,loggedAt:r.logged_at});
const mapQC = r => ({id:r.id,date:r.date,shiftId:r.shift_id,section:r.section,machineId:r.machine_id,orderId:r.order_id,operatorId:r.operator_id,checks:r.checks||{},remarks:r.remarks,approvedBy:r.approved_by,allPassed:r.all_passed,savedAt:r.saved_at,savedBy:r.saved_by});

// ============================================================
// CALCULATIONS
// ============================================================
function effectiveHours(shiftHours, orderChanges = 0, materialWaitHours = 0) {
  return Math.max(0, shiftHours - 1 - Number(orderChanges) - Number(materialWaitHours));
}

function calcDBWBSection(personnel, effHrs, activeDieBonders) {
  const operators = personnel.filter(p => [ROLES.OPERATOR, ROLES.SENIOR_OPERATOR].includes(p.role)).length;
  const trainees = personnel.filter(p => p.role === ROLES.TRAINEE).length;
  const headcountUPH = operators * OPERATOR_DBWB_UPH + trainees * TRAINEE_DBWB_UPH;
  const dbMachineUPH = activeDieBonders.reduce((s, id) => s + (DIE_BONDERS.find(d => d.id === id)?.uph || 0), 0);
  const wbMachineUPH = activeDieBonders.length * WB_UPH_PER_MACHINE;
  return {
    headcountUPH,
    dbMachineUPH,
    wbMachineUPH,
    targetUPH: headcountUPH,
    targetTotal: headcountUPH * effHrs,
    perPerson: personnel.map(p => {
      const uph = [ROLES.OPERATOR, ROLES.SENIOR_OPERATOR].includes(p.role) ? OPERATOR_DBWB_UPH : TRAINEE_DBWB_UPH;
      return { ...p, uph, targetTotal: uph * effHrs };
    }),
  };
}

function calcDispensingSection(activeMachines, effHrs) {
  const uph = Number(activeMachines) * DISPENSING_UPH;
  return { targetUPH: uph, targetTotal: uph * effHrs };
}

function calcTapingSection(personnel, activeMachines, effHrs) {
  const operators = personnel.filter(p => [ROLES.OPERATOR, ROLES.SENIOR_OPERATOR].includes(p.role)).length;
  const trainees = personnel.filter(p => p.role === ROLES.TRAINEE).length;
  const headcountRPH = operators * OPERATOR_TAPING_UPH + trainees * TRAINEE_TAPING_UPH;
  const machineRPH = Number(activeMachines) * TAPING_TARGET_PER_MACHINE;
  const effectiveRPH = Math.min(headcountRPH, machineRPH);
  return {
    headcountRPH, machineRPH, effectiveRPH,
    targetTotal: effectiveRPH * effHrs,
    perPerson: personnel.map(p => {
      const rph = [ROLES.OPERATOR, ROLES.SENIOR_OPERATOR].includes(p.role) ? OPERATOR_TAPING_UPH : TRAINEE_TAPING_UPH;
      return { ...p, rph, targetTotal: rph * effHrs };
    }),
  };
}

function pct(actual, target) {
  if (!target || target <= 0) return 0;
  return Math.round((Number(actual) / Number(target)) * 100);
}

function statusColor(p) {
  if (p >= 100) return "#00e5a0";
  if (p >= 85) return "#f5c518";
  return "#ff4d6d";
}

function today() { return new Date().toISOString().slice(0, 10); }
function monthKey(iso) { return String(iso || "").slice(0, 7); }
function formatDate(iso) {
  try { return new Date(iso).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }); }
  catch { return iso; }
}


// ============================================================
// ROOT APP — Supabase connected
// ============================================================
function App() {
  const { useState, useEffect, useCallback, useRef } = React;
  const [db, setDb] = useState({users:[],shiftLogs:[],downtimeLogs:[],qcLogs:[],traineeEvals:[],productionOrders:[],yieldLogs:[]});
  const [loading, setLoading] = useState(true);
  const [syncErr, setSyncErr] = useState(null);
  const [currentUser, setCurrentUser] = useState(null);

  async function loadAll() {
    try {
      const [users, logs, dts, qcs, evs, orders, yields] = await Promise.all([
        sbGet("users","order=name"),
        sbGet("shift_logs","order=date.desc&limit=300"),
        sbGet("downtime_logs","order=logged_at.desc&limit=500"),
        sbGet("qc_logs","order=saved_at.desc&limit=500"),
        sbGet("trainee_evals","order=date.asc"),
        sbGet("production_orders","order=created_at.desc&limit=200"),
        sbGet("yield_logs","order=logged_at.desc&limit=500"),
      ]);
      setDb({users:users.map(mapU),shiftLogs:logs.map(mapL),downtimeLogs:dts.map(mapDT),qcLogs:qcs.map(mapQC),traineeEvals:evs.map(mapEV),productionOrders:(orders||[]).map(mapPO),yieldLogs:(yields||[]).map(mapYL)});
    } catch(e) { setSyncErr(e.message); }
    finally { setLoading(false); }
  }

  useEffect(()=>{ loadAll(); },[]);

  // Poll every 30s for remote sync
  useEffect(()=>{
    if (!currentUser) return;
    const id = setInterval(loadAll, 30000);
    return ()=>clearInterval(id);
  },[currentUser]);

  // Persist helpers
  async function persist_user(user) {
    await sbUpsert("users",{id:user.id,name:user.name,role:user.role,pin:user.pin,active:user.active,mentor_id:user.mentorId||null});
    const u = await sbGet("users","order=name");
    setDb(d=>({...d,users:u.map(mapU)}));
  }
  async function persist_log(log) {
    await sbUpsert("shift_logs",{id:log.id,date:log.date,shift_id:log.shiftId,shift_incharge_id:log.shiftInchargeId,order_changes:log.orderChanges,material_wait_hours:log.materialWaitHours,active_die_bonders:log.activeDieBonders,sections:log.sections,failure_causes:log.failureCauses,notes:log.notes,voice_note:log.voiceNote,saved_at:log.savedAt,saved_by:log.savedBy});
    const l = await sbGet("shift_logs","order=date.desc&limit=300");
    setDb(d=>({...d,shiftLogs:l.map(mapL)}));
  }
  async function persist_dt(dt) {
    await sbUpsert("downtime_logs",{id:dt.id,machine_id:dt.machineId,section:dt.section,start_time:dt.startTime,description:dt.description,category:dt.category,supervisor_notified:dt.supervisorNotified,maintenance_response_mins:dt.maintenanceResponseMins?Number(dt.maintenanceResponseMins):null,resolved:dt.resolved,resolved_at:dt.resolvedAt,logged_by:dt.loggedBy});
    const l = await sbGet("downtime_logs","order=logged_at.desc&limit=500");
    setDb(d=>({...d,downtimeLogs:l.map(mapDT)}));
  }
  async function persist_qc(qc) {
    await sbUpsert("qc_logs",{id:qc.id,date:qc.date,shift_id:qc.shiftId,section:qc.section,machine_id:qc.machineId,order_id:qc.orderId,operator_id:qc.operatorId,checks:qc.checks,remarks:qc.remarks,approved_by:qc.approvedBy,all_passed:qc.allPassed,saved_at:qc.savedAt,saved_by:qc.savedBy});
    const l = await sbGet("qc_logs","order=saved_at.desc&limit=500");
    setDb(d=>({...d,qcLogs:l.map(mapQC)}));
  }
  async function persist_eval(ev) {
    await sbUpsert("trainee_evals",{id:ev.id,trainee_id:ev.traineeId,evaluator_id:ev.evaluatorId,date:ev.date,scores:ev.scores,notes:ev.notes,recommendation:ev.recommendation,saved_at:ev.savedAt});
    const l = await sbGet("trainee_evals","order=date.asc");
    setDb(d=>({...d,traineeEvals:l.map(mapEV)}));
  }

  async function persist_order(order) {
    await sbUpsert("production_orders", {
      id:order.id, order_ref:order.orderRef, customer:order.customer, led_type:order.ledType,
      wafer_size:order.waferSize, sp_config:order.spConfig, wafer_qty:Number(order.waferQty)||0,
      target_qty:Number(order.targetQty)||0, due_date:order.dueDate, priority:order.priority,
      status:order.status, customer_bins:order.customerBins, target_yield_pct:Number(order.targetYieldPct)||90,
      vf_min:order.vfMin, vf_max:order.vfMax, iv_min:order.ivMin, iv_max:order.ivMax, cct:order.cct,
      assigned_machines:order.assignedMachines||[], assigned_by:order.assignedBy||null,
      assigned_at:order.assignedAt||null, created_by:order.createdBy, created_at:order.createdAt,
      notes:order.notes||null, bin_names:order.binNames||{}
    });
    const o = await sbGet("production_orders","order=created_at.desc&limit=200");
    setDb(d=>({...d,productionOrders:o.map(mapPO)}));
  }
  async function persist_yield(yl) {
    await sbUpsert("yield_logs", {
      id:yl.id, order_id:yl.orderId, machine_id:yl.machineId,
      bin_data:yl.binData, total_sorted:Number(yl.totalSorted)||0,
      reject_pct:Number(yl.rejectPct)||0, customer_yield_pct:Number(yl.customerYieldPct)||0,
      reels_produced:Number(yl.reelsProduced)||0, partial_reel:Number(yl.partialReel)||0,
      passed:yl.passed, photo_url:yl.photoUrl||null, notes:yl.notes||null,
      logged_by:yl.loggedBy, logged_at:yl.loggedAt
    });
    const y = await sbGet("yield_logs","order=logged_at.desc&limit=500");
    setDb(d=>({...d,yieldLogs:y.map(mapYL)}));
  }
  // Legacy persist shim — maps old localStorage persist() calls to supabase
  // The old code calls persist({ ...db, users:[...] }) etc.
  // We intercept by comparing what changed
  const persist = useCallback(async (newDb) => {
    // Detect what changed and call appropriate supabase function
    const newUsers = newDb.users || [];
    const newLogs = newDb.shiftLogs || [];
    const newDTs = newDb.downtimeLogs || [];
    const newQCs = newDb.qcLogs || [];
    const newEvs = newDb.traineeEvals || [];

    // Find new/changed users
    for (const u of newUsers) {
      const old = db.users.find(x=>x.id===u.id);
      if (!old || JSON.stringify(old)!==JSON.stringify(u)) await persist_user(u);
    }
    // Find new shift logs
    for (const l of newLogs) {
      if (!db.shiftLogs.find(x=>x.id===l.id)) await persist_log(l);
    }
    // Find new/changed downtime
    for (const d of newDTs) {
      const old = db.downtimeLogs.find(x=>x.id===d.id);
      if (!old || JSON.stringify(old)!==JSON.stringify(d)) await persist_dt(d);
    }
    // Find new qc logs
    for (const q of newQCs) {
      if (!db.qcLogs.find(x=>x.id===q.id)) await persist_qc(q);
    }
    // Find new evals
    for (const e of newEvs) {
      if (!db.traineeEvals.find(x=>x.id===e.id)) await persist_eval(e);
    }
    setDb(newDb);
  }, [db]);

  function login(id, pin) {
    const u = db.users.find(u=>u.id===id&&u.pin===pin&&u.active);
    if (u) { setCurrentUser(u); return true; }
    return false;
  }

  const activeAlarms = db.downtimeLogs.filter(d=>{
    if (d.resolved) return false;
    return (Date.now()-new Date(d.startTime).getTime())/3600000 > 24;
  });

  if (loading) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16,fontFamily:"'DM Mono',monospace",background:"#07111e"}}>
      <div style={{fontSize:40,color:"#00e5a0"}}>⬡</div>
      <div style={{fontSize:14,color:"#00e5a0",letterSpacing:3}}>PRODTRACK</div>
      <div style={{width:32,height:32,border:"3px solid #1e3347",borderTopColor:"#00e5a0",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <div style={{fontSize:11,color:"#5a7a8a"}}>Connecting to database...</div>
      {syncErr && <div style={{color:"#ff4d6d",fontSize:11,maxWidth:400,textAlign:"center"}}>⚠ {syncErr}<br/>Check your internet connection and reload.</div>}
    </div>
  );

  if (!currentUser) return <LoginView db={db} onLogin={login} syncErr={syncErr}/>;

  return <DashboardShell currentUser={currentUser} db={db} persist={persist} persist_order={persist_order} persist_yield={persist_yield} onLogout={()=>setCurrentUser(null)} activeAlarms={activeAlarms}/>;
}

// ============================================================
// LOGIN
// ============================================================
function LoginView({ onLogin, db, syncErr }) {
  const [id, setId] = useState("");
  const [pin, setPin] = useState("");
  const [err, setErr] = useState("");
  const [debug, setDebug] = useState(false);

  function handle() {
    if (!onLogin(id.trim().toUpperCase(), pin.trim())) setErr("Invalid ID or PIN. Users in DB: " + (db ? db.users.length : 0));
  }

  return (
    <div style={S.loginWrap}>
      <style>{CSS}</style>
      <div style={S.loginCard}>
        <div style={S.brand}>
          <span style={S.brandIcon}>⬡</span>
          <div>
            <div style={S.brandName}>PRODTRACK</div>
            <div style={S.brandSub}>Production Performance System</div>
          </div>
        </div>
        {syncErr && <div style={{background:"#ff4d6d15",border:"1px solid #ff4d6d44",borderRadius:6,padding:"8px 12px",fontSize:11,color:"#ff4d6d",marginBottom:12}}>DB Error: {syncErr}</div>}
        <Field label="Employee ID">
          <input style={S.input} value={id} onChange={e => { setId(e.target.value); setErr(""); }} placeholder="e.g. CEO001" onKeyDown={e => e.key === "Enter" && handle()} autoCapitalize="none" autoCorrect="off" spellCheck="false" />
        </Field>
        <Field label="PIN">
          <input style={S.input} type="password" value={pin} onChange={e => { setPin(e.target.value); setErr(""); }} placeholder="••••" onKeyDown={e => e.key === "Enter" && handle()} />
        </Field>
        {err && <div style={S.errMsg}>{err}</div>}
        <button style={S.btnPrimary} onClick={handle}>SIGN IN →</button>
        <div style={{marginTop:16,fontSize:10,color:"#5a7a8a",cursor:"pointer",textDecoration:"underline"}} onClick={()=>setDebug(!debug)}>
          {debug ? "Hide" : "Show"} debug info
        </div>
        {debug && db && (
          <div style={{marginTop:8,background:"#07111e",border:"1px solid #1e3347",borderRadius:6,padding:10,fontSize:10}}>
            <div style={{color:"#5a7a8a"}}>Users fetched from DB: <b style={{color:"#00e5a0"}}>{db.users.length}</b></div>
            {db.users.map(u => (
              <div key={u.id} style={{marginTop:4,color:"#c8dae8"}}>id=<b>{u.id}</b> pin=<b>{u.pin}</b> active=<b>{String(u.active)}</b></div>
            ))}
            {db.users.length === 0 && <div style={{color:"#ff4d6d",marginTop:4}}>No users loaded — DB connection may be failing</div>}
          </div>
        )}
      </div>
    </div>
  );
}

function DashboardShell({ currentUser, db, persist, persist_order, persist_yield, onLogout, activeAlarms }) {
  const role = currentUser.role;
  const isExec = [ROLES.CEO, ROLES.CFO, ROLES.OPS_HEAD].includes(role);
  const isSI = role === ROLES.SHIFT_INCHARGE;
  const isMaint = [ROLES.MAINT_SUPERVISOR, ROLES.MAINT_JUNIOR].includes(role);
  const isProd = PROD_ROLES.includes(role);
  const isStore = role === ROLES.STORE;

  const canOrder = CAN_CREATE_ORDER.includes(role);

  if (isExec || isSI || isMaint) tabs.push({ id: "overview", label: "Overview" });
  if (isExec) tabs.push({ id: "executive", label: "⬡ Executive Summary" });

      <header style={S.hdr}>
        <div style={S.hdrL}>

        <div style={S.hdrR}>

        {tab === "executive" && <ExecutiveSummaryTab db={db} currentUser={currentUser} />}
        {tab === "entry"     && <ShiftEntryTab db={db} persist={persist} currentUser={currentUser} />}
        {tab === "qc"        && <QCChecklistTab db={db} persist={persist} currentUser={currentUser} />}
        {tab === "downtime"  && <DowntimeTab db={db} persist={persist} currentUser={currentUser} isExec={isExec} isMaint={isMaint} />}
        {tab === "monthly"   && <MonthlyTab db={db} />}
        {tab === "trainee"   && <TraineeTrackerTab db={db} persist={persist} currentUser={currentUser} isExec={isExec} />}
        {tab === "si_score"  && <SIAccountabilityTab db={db} currentUser={currentUser} isExec={isExec} />}
        {tab === "export"    && <ExportTab db={db} />}
        {tab === "personnel" && <PersonnelTab db={db} persist={persist} />}
        {tab === "myStats"   && <MyStatsTab db={db} currentUser={currentUser} />}
        {tab === "orders"    && <ProductionOrdersTab db={db} persist_order={persist_order} currentUser={currentUser} canOrder={canOrder} />}
        {tab === "assign"    && <MachineAssignmentTab db={db} persist_order={persist_order} currentUser={currentUser} />}

        {tab === "yield"     && <YieldTrackerTab db={db} persist_yield={persist_yield} persist_order={persist_order} currentUser={currentUser} />}
      </main>
    </div>
  );
}

// ============================================================
// OVERVIEW TAB
// ============================================================
function OverviewTab({ db }) {
  const logs = [...db.shiftLogs].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 12);

  return (
    <div>
      <PageTitle>Recent Shift Performance</PageTitle>
      {logs.length === 0 && <Empty text="No shift data recorded yet. Shift Incharge should enter first shift." />}
      <div style={S.grid3}>
        {logs.map(log => <ShiftCard key={log.id} log={log} db={db} />)}
      </div>
    </div>
  );
}

function ShiftCard({ log, db }) {
  const shift = SHIFTS.find(s => s.id === log.shiftId) || SHIFTS[0];
  const effHrs = effectiveHours(shift.hours, log.orderChanges, log.materialWaitHours);
  const users = (ids) => (ids || []).map(id => db.users.find(u => u.id === id)).filter(Boolean);

  const dbwb = calcDBWBSection(users(log.sections?.dbwb?.personnel), effHrs, log.activeDieBonders || []);
  const disp = calcDispensingSection(log.sections?.dispensing?.activeMachines || 0, effHrs);
  const tape = calcTapingSection(users(log.sections?.taping?.personnel), log.sections?.taping?.activeMachines || 0, effHrs);

  const dbP  = pct(log.sections?.dbwb?.dbActual, dbwb.targetTotal);
  const wbP  = pct(log.sections?.dbwb?.wbActual, dbwb.targetTotal);
  const dpP  = pct(log.sections?.dispensing?.actual, disp.targetTotal);
  const tpP  = pct(log.sections?.taping?.reelsActual, tape.targetTotal);
  const overall = Math.round((dbP + wbP + dpP + tpP) / 4);

  const col = statusColor(overall);

  return (
    <div style={{ ...S.card, borderColor: overall < 85 ? "#ff4d6d44" : S.card.borderColor }}>
      <div style={S.cardHead}>
        <span style={S.cardDate}>{formatDate(log.date)}</span>
        <span style={{ ...S.badge, background: "#ffffff08" }}>{shift.name}</span>
        <span style={{ ...S.badge, background: col + "22", color: col, border: `1px solid ${col}44` }}>
          {overall}%
        </span>
      </div>
      <div style={S.metrics}>
        <Meter label="Die Bond" p={dbP} />
        <Meter label="Wire Bond" p={wbP} />
        <Meter label="Dispensing" p={dpP} />
        <Meter label="Taping" p={tpP} />
      </div>
      <div style={S.cardFoot}>
        <span style={S.meta}>Eff: {effHrs.toFixed(1)}h · SI: {log.shiftInchargeId}</span>
        {(log.failureCauses || []).map(c => (
          <span key={c} style={{ ...S.tag, background: c === "Machine" ? "#ff4d6d15" : c === "Material" ? "#f5c51815" : "#8888ff15", color: c === "Machine" ? "#ff4d6d" : c === "Material" ? "#f5c518" : "#aaaaff" }}>{c}</span>
        ))}
      </div>
      {log.notes && <div style={S.note}>📝 {log.notes}</div>}
      {log.voiceNote && <VoiceNotePlayer src={log.voiceNote} />}
    </div>
  );
}

function Meter({ label, p }) {
  return (
    <div style={S.meter}>
      <div style={S.meterLabel}>{label}</div>
      <div style={S.meterTrack}><div style={{ ...S.meterFill, width: `${Math.min(100, p)}%`, background: statusColor(p) }} /></div>
      <div style={{ ...S.meterPct, color: statusColor(p) }}>{p}%</div>
    </div>
  );
}

// ============================================================
// SHIFT ENTRY TAB
// ============================================================
function ShiftEntryTab({ db, persist, currentUser }) {
  const blank = {
    date: today(), shiftId: "morning", shiftInchargeId: currentUser.id,
    orderChanges: 0, materialWaitHours: 0, activeDieBonders: [],
    sections: {
      dbwb: { personnel: [], dbActual: "", wbActual: "", dbActual2: "", wbActual2: "" },
      dispensing: { activeMachines: 1, personnel: [], actual: "", actual2: "" },
      taping: { activeMachines: 2, personnel: [], reelsActual: "", reelsActual2: "" },
    },
    failureCauses: [], notes: "", voiceNote: null,
  };
  const [form, setForm] = useState(blank);
  const [flash, setFlash] = useState(null);
  const [errs, setErrs] = useState([]);

  const shift = SHIFTS.find(s => s.id === form.shiftId);
  const effHrs = effectiveHours(shift.hours, form.orderChanges, form.materialWaitHours);
  const prodUsers = db.users.filter(u => PROD_ROLES.includes(u.role) && u.active);
  const usersOf = (ids) => ids.map(id => db.users.find(u => u.id === id)).filter(Boolean);

  const dbwb = calcDBWBSection(usersOf(form.sections.dbwb.personnel), effHrs, form.activeDieBonders);
  const disp = calcDispensingSection(form.sections.dispensing.activeMachines, effHrs);
  const tape = calcTapingSection(usersOf(form.sections.taping.personnel), form.sections.taping.activeMachines, effHrs);

  function setS(sec, k, v) { setForm(f => ({ ...f, sections: { ...f.sections, [sec]: { ...f.sections[sec], [k]: v } } })); }
  function togglePerson(sec, uid) {
    const cur = form.sections[sec].personnel;
    setS(sec, "personnel", cur.includes(uid) ? cur.filter(x => x !== uid) : [...cur, uid]);
  }
  function toggleDB(id) {
    const cur = form.activeDieBonders;
    if (cur.includes(id)) setForm(f => ({ ...f, activeDieBonders: cur.filter(x => x !== id) }));
    else if (cur.length < 7) setForm(f => ({ ...f, activeDieBonders: [...cur, id] }));
  }
  function toggleCause(c) {
    const cur = form.failureCauses;
    setForm(f => ({ ...f, failureCauses: cur.includes(c) ? cur.filter(x => x !== c) : [...cur, c] }));
  }

  function mismatch(a, b) { return a !== "" && b !== "" && String(a) !== String(b); }

  function validate() {
    const e = [];
    if (!form.date) e.push("Date required");
    if (form.activeDieBonders.length === 0) e.push("Select at least one die bonder");
    if (mismatch(form.sections.dbwb.dbActual, form.sections.dbwb.dbActual2)) e.push("Die Bonding: double-entry mismatch");
    if (mismatch(form.sections.dbwb.wbActual, form.sections.dbwb.wbActual2)) e.push("Wire Bonding: double-entry mismatch");
    if (mismatch(form.sections.dispensing.actual, form.sections.dispensing.actual2)) e.push("Dispensing: double-entry mismatch");
    if (mismatch(form.sections.taping.reelsActual, form.sections.taping.reelsActual2)) e.push("Taping: double-entry mismatch");
    return e;
  }

  async function save() {
    const e = validate();
    if (e.length) { setErrs(e); return; }
    setErrs([]);

    let voiceNoteDataUrl = null;
    if (form.voiceNote) {
      voiceNoteDataUrl = await new Promise(res => {
        const reader = new FileReader();
        reader.onloadend = () => res(reader.result);
        reader.readAsDataURL(form.voiceNote);
      });
    }

    const log = {
      id: `LOG-${Date.now()}`,
      date: form.date, shiftId: form.shiftId, shiftInchargeId: form.shiftInchargeId,
      orderChanges: Number(form.orderChanges), materialWaitHours: Number(form.materialWaitHours),
      activeDieBonders: form.activeDieBonders,
      sections: {
        dbwb: { personnel: form.sections.dbwb.personnel, dbActual: Number(form.sections.dbwb.dbActual) || 0, wbActual: Number(form.sections.dbwb.wbActual) || 0 },
        dispensing: { activeMachines: Number(form.sections.dispensing.activeMachines), actual: Number(form.sections.dispensing.actual) || 0 },
        taping: { activeMachines: Number(form.sections.taping.activeMachines), personnel: form.sections.taping.personnel, reelsActual: Number(form.sections.taping.reelsActual) || 0 },
      },
      failureCauses: form.failureCauses, notes: form.notes,
      voiceNote: voiceNoteDataUrl,
      savedAt: new Date().toISOString(), savedBy: currentUser.id,
    };
    const cutoff = new Date(); cutoff.setMonth(cutoff.getMonth() - 6);
    const trimmed = db.shiftLogs.filter(l => new Date(l.date) >= cutoff);
    persist({ ...db, shiftLogs: [...trimmed, log] });
    setFlash("success");
    setForm(blank);
    setTimeout(() => setFlash(null), 3000);
  }

  return (
    <div>
      <PageTitle>Shift Data Entry</PageTitle>
      {flash === "success" && <Flash type="success">✓ Shift data saved successfully!</Flash>}
      {errs.length > 0 && <Flash type="error">{errs.map((e, i) => <div key={i}>⚠ {e}</div>)}</Flash>}

      {/* — Shift Info — */}
      <Card title="Shift Information">
        <Row>
          <Col><Field label="Date"><input style={S.input} type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} /></Field></Col>
          <Col><Field label="Shift"><select style={S.select} value={form.shiftId} onChange={e => setForm(f => ({ ...f, shiftId: e.target.value }))}>{SHIFTS.map(s => <option key={s.id} value={s.id}>{s.name} ({s.hours}h)</option>)}</select></Field></Col>
          <Col><Field label="Order Changes"><input style={S.input} type="number" min="0" value={form.orderChanges} onChange={e => setForm(f => ({ ...f, orderChanges: e.target.value }))} /></Field></Col>
          <Col><Field label="Material Wait (hrs)"><input style={S.input} type="number" min="0" step="0.5" value={form.materialWaitHours} onChange={e => setForm(f => ({ ...f, materialWaitHours: e.target.value }))} /></Field></Col>
        </Row>
        <Info>Effective production hours: <b style={{ color: "#00e5a0" }}>{effHrs.toFixed(1)} hrs</b> &nbsp;({shift.hours}h shift − 1h setup − {form.orderChanges}h order changes − {form.materialWaitHours}h material wait)</Info>
      </Card>

      {/* — Die Bonder Selection — */}
      <Card title={`Active Die Bonders — select up to 7 (${form.activeDieBonders.length} selected)`}>
        <div style={S.chips}>
          {DIE_BONDERS.map(d => {
            const on = form.activeDieBonders.includes(d.id);
            return (
              <button key={d.id} style={{ ...S.chip, ...(on ? S.chipOn : {}) }} onClick={() => toggleDB(d.id)}>
                {d.name}<br /><span style={{ fontSize: 9, color: on ? "#00e5a0aa" : "#5a7a8a" }}>{(d.uph / 1000).toFixed(1)}K UPH</span>
              </button>
            );
          })}
        </div>
        {form.activeDieBonders.length > 0 && (
          <Info>
            DB capacity: <b style={{ color: "#00e5a0" }}>{dbwb.dbMachineUPH.toLocaleString()} UPH</b>
            &nbsp;· WB capacity: <b style={{ color: "#00e5a0" }}>{dbwb.wbMachineUPH.toLocaleString()} UPH</b>
            &nbsp;· Headcount target: <b style={{ color: "#f5c518" }}>{dbwb.headcountUPH.toLocaleString()} UPH</b>
          </Info>
        )}
      </Card>

      {/* — DB/WB Section — */}
      <Card title="Section 1 — Die Bonding & Wire Bonding">
        <div style={S.subLabel}>Assign operators / trainees</div>
        <div style={S.chips}>
          {prodUsers.map(u => { const on = form.sections.dbwb.personnel.includes(u.id); return (
            <button key={u.id} style={{ ...S.chip, ...(on ? S.chipOn : {}) }} onClick={() => togglePerson("dbwb", u.id)}>
              {u.name}<br /><span style={{ fontSize: 9, color: on ? "#00e5a0aa" : "#5a7a8a" }}>{u.role === ROLES.TRAINEE ? "TR" : u.role === ROLES.SENIOR_OPERATOR ? "SO" : "OP"}</span>
            </button>
          ); })}
        </div>
        {form.sections.dbwb.personnel.length > 0 && (
          <Info>Combined target: <b style={{ color: "#00e5a0" }}>{dbwb.targetUPH.toLocaleString()} UPH · {dbwb.targetTotal.toLocaleString()} units over {effHrs.toFixed(1)}h</b></Info>
        )}
        <Row>
          <Col><Field label="Die Bonding Actual — Entry 1"><input style={S.input} type="number" min="0" value={form.sections.dbwb.dbActual} onChange={e => setS("dbwb", "dbActual", e.target.value)} /></Field></Col>
          <Col><Field label="Die Bonding Actual — Entry 2 (verify)">
            <input style={{ ...S.input, borderColor: mismatch(form.sections.dbwb.dbActual, form.sections.dbwb.dbActual2) ? "#ff4d6d" : undefined }} type="number" min="0" value={form.sections.dbwb.dbActual2} onChange={e => setS("dbwb", "dbActual2", e.target.value)} />
          </Field></Col>
        </Row>
        <Row>
          <Col><Field label="Wire Bonding Actual — Entry 1"><input style={S.input} type="number" min="0" value={form.sections.dbwb.wbActual} onChange={e => setS("dbwb", "wbActual", e.target.value)} /></Field></Col>
          <Col><Field label="Wire Bonding Actual — Entry 2 (verify)">
            <input style={{ ...S.input, borderColor: mismatch(form.sections.dbwb.wbActual, form.sections.dbwb.wbActual2) ? "#ff4d6d" : undefined }} type="number" min="0" value={form.sections.dbwb.wbActual2} onChange={e => setS("dbwb", "wbActual2", e.target.value)} />
          </Field></Col>
        </Row>
        {form.sections.dbwb.dbActual !== "" && (
          <div style={{ display: "flex", gap: 16, marginTop: 8 }}>
            <AchBox label="Die Bonding" actual={Number(form.sections.dbwb.dbActual)} target={dbwb.targetTotal} />
            <AchBox label="Wire Bonding" actual={Number(form.sections.dbwb.wbActual)} target={dbwb.targetTotal} />
          </div>
        )}
      </Card>

      {/* — Dispensing — */}
      <Card title="Section 2 — Dispensing">
        <Row>
          <Col><Field label="Active Machines (max 2)"><select style={S.select} value={form.sections.dispensing.activeMachines} onChange={e => setS("dispensing", "activeMachines", e.target.value)}>{[0,1,2].map(n => <option key={n} value={n}>{n}</option>)}</select></Field></Col>
          <Col>
            {disp.targetTotal > 0 && <Info style={{ marginTop: 20 }}>Target: <b style={{ color: "#00e5a0" }}>{disp.targetTotal.toLocaleString()} units</b></Info>}
          </Col>
        </Row>
        <Row>
          <Col><Field label="Actual Output — Entry 1"><input style={S.input} type="number" min="0" value={form.sections.dispensing.actual} onChange={e => setS("dispensing", "actual", e.target.value)} /></Field></Col>
          <Col><Field label="Actual Output — Entry 2 (verify)">
            <input style={{ ...S.input, borderColor: mismatch(form.sections.dispensing.actual, form.sections.dispensing.actual2) ? "#ff4d6d" : undefined }} type="number" min="0" value={form.sections.dispensing.actual2} onChange={e => setS("dispensing", "actual2", e.target.value)} />
          </Field></Col>
        </Row>
        {form.sections.dispensing.actual !== "" && <AchBox label="Dispensing" actual={Number(form.sections.dispensing.actual)} target={disp.targetTotal} />}
      </Card>

      {/* — Sorting & Taping — */}
      <Card title="Section 3 — Sorting & Taping">
        <div style={S.subLabel}>Assign operators / trainees</div>
        <div style={S.chips}>
          {prodUsers.map(u => { const on = form.sections.taping.personnel.includes(u.id); return (
            <button key={u.id} style={{ ...S.chip, ...(on ? S.chipOn : {}) }} onClick={() => togglePerson("taping", u.id)}>
              {u.name}<br /><span style={{ fontSize: 9, color: on ? "#00e5a0aa" : "#5a7a8a" }}>{u.role === ROLES.TRAINEE ? "TR" : u.role === ROLES.SENIOR_OPERATOR ? "SO" : "OP"}</span>
            </button>
          ); })}
        </div>
        <Row>
          <Col><Field label="Active Taping Machines (max 4)"><select style={S.select} value={form.sections.taping.activeMachines} onChange={e => setS("taping", "activeMachines", e.target.value)}>{[0,1,2,3,4].map(n => <option key={n} value={n}>{n}</option>)}</select></Field></Col>
          <Col>
            {tape.effectiveRPH > 0 && (
              <Info style={{ marginTop: 20 }}>
                Headcount: <b style={{ color: "#f5c518" }}>{tape.headcountRPH.toFixed(2)} reels/h</b>
                · Machine: <b style={{ color: "#f5c518" }}>{tape.machineRPH} reels/h</b>
                · Target: <b style={{ color: "#00e5a0" }}>{tape.targetTotal.toFixed(1)} reels</b>
              </Info>
            )}
          </Col>
        </Row>
        <Row>
          <Col><Field label="Reels Produced — Entry 1"><input style={S.input} type="number" min="0" step="0.5" value={form.sections.taping.reelsActual} onChange={e => setS("taping", "reelsActual", e.target.value)} /></Field></Col>
          <Col><Field label="Reels Produced — Entry 2 (verify)">
            <input style={{ ...S.input, borderColor: mismatch(form.sections.taping.reelsActual, form.sections.taping.reelsActual2) ? "#ff4d6d" : undefined }} type="number" min="0" step="0.5" value={form.sections.taping.reelsActual2} onChange={e => setS("taping", "reelsActual2", e.target.value)} />
          </Field></Col>
        </Row>
        {form.sections.taping.reelsActual !== "" && <AchBox label="Taping" actual={Number(form.sections.taping.reelsActual)} target={tape.targetTotal} />}
      </Card>

      {/* — Failure Causes — */}
      <Card title="Target Failure Causes & Notes">
        <div style={S.subLabel}>Select all causes of target shortfall</div>
        <div style={S.chips}>
          {FAILURE_CAUSES.map(c => {
            const on = form.failureCauses.includes(c);
            const col = c === "Machine" ? "#ff4d6d" : c === "Material" ? "#f5c518" : "#aaaaff";
            return (
              <button key={c} style={{ ...S.chip, ...(on ? { background: col + "20", borderColor: col, color: col } : {}) }} onClick={() => toggleCause(c)}>
                {c === "Machine" ? "🔧" : c === "Material" ? "📦" : "👷"} {c}
              </button>
            );
          })}
        </div>
        <Field label="Notes / Justification (optional — use voice note below if preferred)" style={{ marginTop: 12 }}>
          <textarea style={S.textarea} rows={2} value={form.notes} onChange={e => setForm(f => ({ ...f, notes: e.target.value }))} placeholder="Type here, or record a voice note below..." />
        </Field>
        <VoiceNote
          voiceNote={form.voiceNote}
          onSave={blob => setForm(f => ({ ...f, voiceNote: blob }))}
          onClear={() => setForm(f => ({ ...f, voiceNote: null }))}
        />
      </Card>

      <div style={{ textAlign: "right", marginTop: 4 }}>
        <button style={S.btnPrimary} onClick={save}>SAVE SHIFT DATA →</button>
      </div>
    </div>
  );
}

function AchBox({ label, actual, target }) {
  const p = pct(actual, target);
  const col = statusColor(p);
  return (
    <div style={{ ...S.infoBox, borderColor: col + "44", display: "inline-flex", gap: 12, alignItems: "center", marginRight: 8 }}>
      <span style={{ fontSize: 11, color: "#5a7a8a" }}>{label}</span>
      <span style={{ fontSize: 16, fontWeight: 700, color: col }}>{p}%</span>
      <span style={{ fontSize: 10, color: "#5a7a8a" }}>{actual.toLocaleString()} / {Math.round(target).toLocaleString()}</span>
    </div>
  );
}

// ============================================================
// DOWNTIME TAB
// ============================================================
function DowntimeTab({ db, persist, currentUser, isExec, isMaint }) {
  const blankDT = { machineId: "", section: "DB/WB", startTime: new Date().toISOString().slice(0,16), description: "", category: "Machine", supervisorNotified: "yes", maintenanceResponseMins: "" };
  const [form, setForm] = useState(blankDT);
  const [flash, setFlash] = useState(false);

  const allMachines = [
    ...DIE_BONDERS.map(d => ({ id: d.id, section: "DB/WB" })),
    { id: "DISP-1", section: "Dispensing" }, { id: "DISP-2", section: "Dispensing" },
    { id: "TAPE-1", section: "Taping" }, { id: "TAPE-2", section: "Taping" }, { id: "TAPE-3", section: "Taping" }, { id: "TAPE-4", section: "Taping" },
  ];

  function log() {
    if (!form.machineId) return;
    const entry = { id: `DT-${Date.now()}`, ...form, resolved: false, resolvedAt: null, loggedBy: currentUser.id, loggedAt: new Date().toISOString() };
    persist({ ...db, downtimeLogs: [...db.downtimeLogs, entry] });
    setForm(blankDT); setFlash(true); setTimeout(() => setFlash(false), 2000);
  }

  function resolve(id) {
    persist({ ...db, downtimeLogs: db.downtimeLogs.map(d => d.id === id ? { ...d, resolved: true, resolvedAt: new Date().toISOString() } : d) });
  }

  const now = Date.now();
  const active = db.downtimeLogs.filter(d => !d.resolved);
  const resolved = [...db.downtimeLogs.filter(d => d.resolved)].sort((a,b) => b.resolvedAt.localeCompare(a.resolvedAt));

  return (
    <div>
      <PageTitle>Machine Downtime Management</PageTitle>

      {active.length > 0 && (
        <>
          <Subtitle>🔴 Active Downtime ({active.length})</Subtitle>
          <div style={S.grid3}>
            {active.map(d => {
              const hrs = (now - new Date(d.startTime).getTime()) / 3600000;
              const alarm = hrs > 24;
              return (
                <div key={d.id} style={{ ...S.card, borderColor: alarm ? "#ff4d6d" : "#1e3347", boxShadow: alarm ? "0 0 20px #ff4d6d33" : "none" }}>
                  {alarm && <div style={S.alarmBanner}>⚠ {hrs.toFixed(1)}h DOWNTIME — CEO/CFO ALERT ACTIVE</div>}
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                    <b style={{ color: "#eaf4fc" }}>{d.machineId}</b>
                    <span style={S.meta}>{d.section}</span>
                  </div>
                  <div style={S.dtRow}>⏱ Started: {new Date(d.startTime).toLocaleString()}</div>
                  <div style={S.dtRow}>⏳ Duration: <b style={{ color: alarm ? "#ff4d6d" : "#f5c518" }}>{hrs.toFixed(1)} hrs</b></div>
                  <div style={S.dtRow}>🏷 Category: {d.category}</div>
                  <div style={S.dtRow}>👤 Logged by: {d.loggedBy}</div>
                  {d.supervisorNotified === "yes" && <div style={S.dtRow}>✓ Supervisor notified</div>}
                  {d.maintenanceResponseMins && <div style={S.dtRow}>🔧 Response: {d.maintenanceResponseMins} min</div>}
                  {d.description && <div style={S.note}>{d.description}</div>}
                  {(isExec || isMaint) && <button style={{ ...S.btnPrimary, marginTop: 10, width: "100%", background: "#00e5a022", color: "#00e5a0", border: "1px solid #00e5a044" }} onClick={() => resolve(d.id)}>MARK RESOLVED</button>}
                </div>
              );
            })}
          </div>
        </>
      )}
      {active.length === 0 && <Flash type="success">✓ No active machine downtime</Flash>}

      <Card title="Log New Downtime Event">
        {flash && <Flash type="success">✓ Downtime event logged.</Flash>}
        <Row>
          <Col><Field label="Machine"><select style={S.select} value={form.machineId} onChange={e => setForm(f => ({ ...f, machineId: e.target.value }))}><option value="">Select...</option>{allMachines.map(m => <option key={m.id} value={m.id}>{m.id} ({m.section})</option>)}</select></Field></Col>
          <Col><Field label="Category"><select style={S.select} value={form.category} onChange={e => setForm(f => ({ ...f, category: e.target.value }))}>{DOWNTIME_CATEGORIES.map(c => <option key={c}>{c}</option>)}</select></Field></Col>
        </Row>
        <Row>
          <Col><Field label="Start Time"><input style={S.input} type="datetime-local" value={form.startTime} onChange={e => setForm(f => ({ ...f, startTime: e.target.value }))} /></Field></Col>
          <Col><Field label="Maintenance Response (mins)"><input style={S.input} type="number" min="0" value={form.maintenanceResponseMins} onChange={e => setForm(f => ({ ...f, maintenanceResponseMins: e.target.value }))} placeholder="Time until maint arrived" /></Field></Col>
          <Col><Field label="Supervisor Notified?"><select style={S.select} value={form.supervisorNotified} onChange={e => setForm(f => ({ ...f, supervisorNotified: e.target.value }))}><option value="yes">Yes</option><option value="no">No</option></select></Field></Col>
        </Row>
        <Field label="Description">
          <textarea style={S.textarea} rows={2} value={form.description} onChange={e => setForm(f => ({ ...f, description: e.target.value }))} placeholder="Describe the fault or issue..." />
        </Field>
        <div style={{ textAlign: "right" }}><button style={S.btnPrimary} onClick={log}>LOG DOWNTIME</button></div>
      </Card>

      {resolved.length > 0 && (
        <>
          <Subtitle>Resolved History</Subtitle>
          <div style={S.tableWrap}>
            <table style={S.tbl}>
              <thead><tr>{["Machine","Category","Started","Resolved","Duration","Response","Logged By"].map(h => <th key={h} style={S.th}>{h}</th>)}</tr></thead>
              <tbody>
                {resolved.map(d => {
                  const dur = ((new Date(d.resolvedAt) - new Date(d.startTime)) / 3600000).toFixed(1);

                    <tr key={d.id}>
                      <td style={S.td}><b>{d.machineId}</b></td>
                      <td style={S.td}>{d.category}</td>

// ============================================================
function MonthlyTab({ db }) {
  const months = [...new Set(db.shiftLogs.map(l => monthKey(l.date)))].sort().reverse();
  const [month, setMonth] = useState(months[0] || today().slice(0,7));
  const logs = db.shiftLogs.filter(l => monthKey(l.date) === month);

  // Build per-person accumulators
  const acc = {};
  db.users.filter(u => PROD_ROLES.includes(u.role)).forEach(u => {
    acc[u.id] = { id: u.id, name: u.name, role: u.role, shifts: 0, dbwbTarget: 0, dbwbActual: 0, tapingTarget: 0, tapingActual: 0 };
  });

  logs.forEach(log => {
    const shift = SHIFTS.find(s => s.id === log.shiftId) || SHIFTS[0];
    const effHrs = effectiveHours(shift.hours, log.orderChanges, log.materialWaitHours);
    const users = (ids) => (ids || []).map(id => db.users.find(u => u.id === id)).filter(Boolean);

    // DB/WB
    const dbwbP = log.sections?.dbwb?.personnel || [];
    const dbwbUsers = users(dbwbP);
    const dbwb = calcDBWBSection(dbwbUsers, effHrs, log.activeDieBonders || []);
    dbwbP.forEach(pid => {
      if (!acc[pid]) return;
      const u = db.users.find(u => u.id === pid);
      const uph = [ROLES.OPERATOR, ROLES.SENIOR_OPERATOR].includes(u?.role) ? OPERATOR_DBWB_UPH : TRAINEE_DBWB_UPH;
      acc[pid].dbwbTarget += uph * effHrs;
      // Prorate actual by headcount
      acc[pid].dbwbActual += ((log.sections.dbwb.dbActual || 0) + (log.sections.dbwb.wbActual || 0)) / 2 / (dbwbP.length || 1);
      acc[pid].shifts += 1;
    });

    // Taping
    const tapP = log.sections?.taping?.personnel || [];
    const tapUsers = users(tapP);
    const tape = calcTapingSection(tapUsers, log.sections?.taping?.activeMachines || 0, effHrs);
    tapP.forEach(pid => {
      if (!acc[pid]) return;
      const u = db.users.find(u => u.id === pid);
      const rph = [ROLES.OPERATOR, ROLES.SENIOR_OPERATOR].includes(u?.role) ? OPERATOR_TAPING_UPH : TRAINEE_TAPING_UPH;
      acc[pid].tapingTarget += rph * effHrs;
      acc[pid].tapingActual += (log.sections.taping.reelsActual || 0) / (tapP.length || 1);
    });
  });

  // Downtime for maintenance
  const dtMonth = db.downtimeLogs.filter(d => monthKey((d.startTime || "").slice(0, 10)) === month);
  const totalDT = dtMonth.filter(d => d.resolved).reduce((s, d) => s + (new Date(d.resolvedAt) - new Date(d.startTime)) / 3600000, 0);
  const avgResp = dtMonth.filter(d => d.maintenanceResponseMins).reduce((s, d) => s + Number(d.maintenanceResponseMins), 0) / (dtMonth.filter(d => d.maintenanceResponseMins).length || 1);

  return (
    <div>
      <PageTitle>Monthly Performance Analysis</PageTitle>
      <Row>
        <Col style={{ maxWidth: 220 }}>
          <Field label="Select Month">
            <select style={S.select} value={month} onChange={e => setMonth(e.target.value)}>
              {months.map(m => <option key={m}>{m}</option>)}
              {!months.length && <option value={today().slice(0,7)}>{today().slice(0,7)}</option>}
            </select>
          </Field>
        </Col>
        <Col style={{ display: "flex", alignItems: "flex-end", paddingBottom: 12 }}>
          <span style={S.meta}>{logs.length} shifts recorded for {month}</span>
        </Col>
      </Row>

      <Subtitle>Production Staff</Subtitle>
      <div style={S.tableWrap}>
        <table style={S.tbl}>
          <thead><tr>{["ID","Name","Role","Shifts","DB/WB Target","DB/WB Actual","DB/WB %","Taping Target(r)","Taping Actual(r)","Taping %","Bonus Units"].map(h => <th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>
            {Object.values(acc).map(a => {
              const dp = pct(a.dbwbActual, a.dbwbTarget);
              const tp = pct(a.tapingActual, a.tapingTarget);
              const bonus = Math.max(0, Math.round(a.dbwbActual - a.dbwbTarget));
              return (
                <tr key={a.id}>
                  <td style={S.td}>{a.id}</td>
                  <td style={S.td}>{a.name}</td>
                  <td style={S.td}>{a.role}</td>
                  <td style={S.td}>{a.shifts}</td>
                  <td style={S.td}>{Math.round(a.dbwbTarget).toLocaleString()}</td>
                  <td style={S.td}>{Math.round(a.dbwbActual).toLocaleString()}</td>
                  <td style={{ ...S.td, color: statusColor(dp), fontWeight: 700 }}>{dp}%</td>
                  <td style={S.td}>{a.tapingTarget.toFixed(1)}</td>
                  <td style={S.td}>{a.tapingActual.toFixed(1)}</td>
                  <td style={{ ...S.td, color: statusColor(tp), fontWeight: 700 }}>{tp}%</td>
                  <td style={{ ...S.td, color: bonus > 0 ? "#00e5a0" : "#5a7a8a", fontWeight: bonus > 0 ? 700 : 400 }}>{bonus > 0 ? `+${bonus.toLocaleString()}` : "—"}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      <Subtitle>Maintenance Team — Downtime Performance</Subtitle>
      <div style={S.grid3}>
        <div style={S.card}>
          <div style={S.meta}>Total Machine Downtime</div>
          <div style={{ fontSize: 28, fontWeight: 700, color: totalDT > 40 ? "#ff4d6d" : "#00e5a0", marginTop: 4 }}>{totalDT.toFixed(1)}h</div>
        </div>
        <div style={S.card}>
          <div style={S.meta}>Avg Maintenance Response</div>
          <div style={{ fontSize: 28, fontWeight: 700, color: avgResp > 30 ? "#f5c518" : "#00e5a0", marginTop: 4 }}>{avgResp.toFixed(0)} min</div>
        </div>
        <div style={S.card}>
          <div style={S.meta}>Total Downtime Events</div>
          <div style={{ fontSize: 28, fontWeight: 700, color: "#eaf4fc", marginTop: 4 }}>{dtMonth.length}</div>
        </div>
      </div>
      <div style={S.tableWrap}>
        <table style={S.tbl}>
          <thead><tr>{["Name","Role","Events Handled","Total Downtime (hrs)","Avg Response (min)","Performance"].map(h => <th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>
            {db.users.filter(u => [ROLES.MAINT_SUPERVISOR, ROLES.MAINT_JUNIOR].includes(u.role)).map(u => {
              const score = totalDT < 20 ? "EXCELLENT" : totalDT < 40 ? "GOOD" : "NEEDS ATTENTION";
              const scoreCol = totalDT < 20 ? "#00e5a0" : totalDT < 40 ? "#f5c518" : "#ff4d6d";
              return (
                <tr key={u.id}>
                  <td style={S.td}>{u.name}</td>
                  <td style={S.td}>{u.role}</td>
                  <td style={S.td}>{dtMonth.length}</td>
                  <td style={{ ...S.td, color: totalDT > 40 ? "#ff4d6d" : "#00e5a0", fontWeight: 700 }}>{totalDT.toFixed(1)}</td>
                  <td style={{ ...S.td, color: avgResp > 30 ? "#f5c518" : "#00e5a0", fontWeight: 700 }}>{avgResp.toFixed(0)}</td>
                  <td style={{ ...S.td, color: scoreCol, fontWeight: 700 }}>{score}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function PersonnelTab({ db, persist }) {
  const blank = { id: "", name: "", role: ROLES.OPERATOR, pin: "" };
  const [form, setForm] = useState(blank);
  const [flash, setFlash] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);

  function add() {
    if (!form.id || !form.name || !form.pin) return;
    if (db.users.find(u => u.id === form.id)) { setFlash({t:"error",m:"Employee ID already exists."}); return; }
    persist({ ...db, users: [...db.users, { ...form, active: true }] });
    setForm(blank); setFlash({t:"success",m:"✓ Employee added."}); setTimeout(() => setFlash(null), 2000);
  }

  function toggle(uid) { persist({ ...db, users: db.users.map(u => u.id === uid ? { ...u, active: !u.active } : u) }); }

  async function deleteUser(uid) {
    try {
      await sbDelete("users", uid);
      persist({ ...db, users: db.users.filter(u => u.id !== uid) });
      setConfirmDel(null);
      setFlash({t:"success",m:"✓ Employee permanently deleted."}); setTimeout(() => setFlash(null), 2000);
    } catch(e) {
      setConfirmDel(null);
      setFlash({t:"error",m:"Delete failed: " + e.message}); setTimeout(() => setFlash(null), 4000);
    }
  }

  return (
    <div>
      <PageTitle>Personnel Management</PageTitle>
      {flash && <Flash type={flash.t}>{flash.m}</Flash>}

      {confirmDel && (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#000000aa",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
          <div style={{background:"#0d1f2f",border:"1px solid #ff4d6d",borderRadius:12,padding:32,maxWidth:380,width:"90%",textAlign:"center"}}>
            <div style={{fontSize:24,marginBottom:12}}>⚠</div>
            <div style={{fontSize:14,fontWeight:700,color:"#eaf4fc",marginBottom:8}}>Delete Employee?</div>
            <div style={{fontSize:12,color:"#5a7a8a",marginBottom:24}}>
              <b style={{color:"#ff4d6d"}}>{db.users.find(u=>u.id===confirmDel)?.name} [{confirmDel}]</b> will be permanently removed. This cannot be undone.
            </div>
            <div style={{display:"flex",gap:12,justifyContent:"center"}}>
              <button style={{background:"#ff4d6d",color:"#fff",border:"none",borderRadius:6,padding:"10px 24px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}} onClick={() => deleteUser(confirmDel)}>YES, DELETE</button>
              <button style={{background:"none",border:"1px solid #1e3347",color:"#5a7a8a",borderRadius:6,padding:"10px 24px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}} onClick={() => setConfirmDel(null)}>CANCEL</button>
            </div>

      <Card title="Add New Employee">
        <Row>
          <Col><Field label="Employee ID"><input style={S.input} value={form.id} onChange={e => setForm(f => ({ ...f, id: e.target.value.toUpperCase() }))} placeholder="e.g. OP004" /></Field></Col>

          <Col><Field label="Role"><select style={S.select} value={form.role} onChange={e => setForm(f => ({ ...f, role: e.target.value }))}>{Object.values(ROLES).map(r => <option key={r}>{r}</option>)}</select></Field></Col>
          <Col><Field label="PIN"><input style={S.input} type="password" value={form.pin} onChange={e => setForm(f => ({ ...f, pin: e.target.value }))} placeholder="4-6 digits" maxLength={6} /></Field></Col>
        </Row>
        <div style={{ textAlign: "right" }}><button style={S.btnPrimary} onClick={add}>ADD EMPLOYEE →</button></div>
      </Card>
      <div style={S.tableWrap}>
        <table style={S.tbl}>
          <thead><tr>{["ID","Name","Role","Status","Activate/Deactivate","Delete"].map(h => <th key={h} style={S.th}>{h}</th>)}</tr></thead>
          <tbody>
            {db.users.map(u => (
              <tr key={u.id}>
                <td style={S.td}>{u.id}</td>
                <td style={S.td}>{u.name}</td>
                <td style={S.td}>{u.role}</td>
                <td style={{ ...S.td, color: u.active ? "#00e5a0" : "#ff4d6d" }}>{u.active ? "Active" : "Inactive"}</td>
                <td style={S.td}>
                  <button style={{ background: u.active ? "#ff4d6d15" : "#00e5a015", border: `1px solid ${u.active ? "#ff4d6d44" : "#00e5a044"}`, color: u.active ? "#ff4d6d" : "#00e5a0", borderRadius: 4, padding: "3px 10px", fontSize: 10, cursor: "pointer", fontFamily: "inherit" }} onClick={() => toggle(u.id)}>

// ============================================================
// EXECUTIVE SUMMARY TAB
// ============================================================
function ExecutiveSummaryTab({ db, currentUser }) {
  const currentMonth = today().slice(0, 7);
  const prevMonth = (() => { const d = new Date(); d.setMonth(d.getMonth() - 1); return d.toISOString().slice(0, 7); })();
  const [month, setMonth] = useState(currentMonth);
  const months = [...new Set(db.shiftLogs.map(l => monthKey(l.date)))].sort().reverse();

  const logs = db.shiftLogs.filter(l => monthKey(l.date) === month);
  const prevLogs = db.shiftLogs.filter(l => monthKey(l.date) === prevMonth);

  // ---- KPI calculations ----
  function calcMonthKPIs(mLogs) {
    let dbPcts = [], wbPcts = [], dpPcts = [], tpPcts = [];
    let totalShifts = mLogs.length;
    let shiftsOnTarget = 0;
    let totalBonusUnits = 0;
    const personAcc = {};

    mLogs.forEach(log => {
      const shift = SHIFTS.find(s => s.id === log.shiftId) || SHIFTS[0];
      const effHrs = effectiveHours(shift.hours, log.orderChanges, log.materialWaitHours);
      const users = (ids) => (ids || []).map(id => db.users.find(u => u.id === id)).filter(Boolean);

      const dbwbP = log.sections?.dbwb?.personnel || [];
      const dbwb = calcDBWBSection(users(dbwbP), effHrs, log.activeDieBonders || []);
      const disp = calcDispensingSection(log.sections?.dispensing?.activeMachines || 0, effHrs);
      const tapP = log.sections?.taping?.personnel || [];
      const tape = calcTapingSection(users(tapP), log.sections?.taping?.activeMachines || 0, effHrs);

      const dp = pct(log.sections?.dbwb?.dbActual, dbwb.targetTotal);
      const wp = pct(log.sections?.dbwb?.wbActual, dbwb.targetTotal);
      const dpp = pct(log.sections?.dispensing?.actual, disp.targetTotal);
      const tp = pct(log.sections?.taping?.reelsActual, tape.targetTotal);
      dbPcts.push(dp); wbPcts.push(wp); dpPcts.push(dpp); tpPcts.push(tp);
      const overall = (dp + wp + dpp + tp) / 4;
      if (overall >= 100) shiftsOnTarget++;

      // Per-person bonus tracking
      dbwbP.forEach(pid => {
        const u = db.users.find(u => u.id === pid);
        const uph = [ROLES.OPERATOR, ROLES.SENIOR_OPERATOR].includes(u?.role) ? OPERATOR_DBWB_UPH : TRAINEE_DBWB_UPH;
        const tgt = uph * effHrs;
        const act = ((log.sections.dbwb.dbActual || 0) + (log.sections.dbwb.wbActual || 0)) / 2 / (dbwbP.length || 1);
        const bonus = Math.max(0, act - tgt);
        if (!personAcc[pid]) personAcc[pid] = { bonus: 0, name: u?.name || pid };
        personAcc[pid].bonus += bonus;
        totalBonusUnits += bonus;
      });
    });

    const avg = arr => arr.length ? Math.round(arr.reduce((a, b) => a + b, 0) / arr.length) : 0;
    return {
      totalShifts, shiftsOnTarget,
      onTargetRate: totalShifts ? Math.round((shiftsOnTarget / totalShifts) * 100) : 0,
      avgDB: avg(dbPcts), avgWB: avg(wbPcts), avgDisp: avg(dpPcts), avgTape: avg(tpPcts),
      overallEfficiency: avg([avg(dbPcts), avg(wbPcts), avg(dpPcts), avg(tpPcts)]),
      totalBonusUnits: Math.round(totalBonusUnits),
      topPerformers: Object.entries(personAcc).sort((a, b) => b[1].bonus - a[1].bonus).slice(0, 3),
    };
  }

  const kpi = calcMonthKPIs(logs);
  const prevKpi = calcMonthKPIs(prevLogs);

  function delta(curr, prev) {
    if (!prev) return null;
    const d = curr - prev;
    return { val: Math.abs(d), up: d >= 0 };
  }

  // Downtime KPIs
  const dtLogs = db.downtimeLogs.filter(d => monthKey((d.startTime || "").slice(0, 10)) === month);
  const activeDT = db.downtimeLogs.filter(d => !d.resolved);
  const totalDTHrs = dtLogs.filter(d => d.resolved).reduce((s, d) => s + (new Date(d.resolvedAt) - new Date(d.startTime)) / 3600000, 0);
  const avgResp = dtLogs.filter(d => d.maintenanceResponseMins).reduce((s, d) => s + Number(d.maintenanceResponseMins), 0) / (dtLogs.filter(d => d.maintenanceResponseMins).length || 1);

  // QC KPIs
  const qcLogs = (db.qcLogs || []).filter(q => monthKey(q.date) === month);
  const qcPassRate = qcLogs.length ? Math.round((qcLogs.filter(q => q.allPassed).length / qcLogs.length) * 100) : null;

  // SI compliance
  const siLogs = db.shiftLogs.filter(l => monthKey(l.date) === month);
  const siIds = [...new Set(siLogs.map(l => l.shiftInchargeId))];

  // Cause breakdown
  const causeCounts = { Manpower: 0, Material: 0, Machine: 0 };
  logs.forEach(l => (l.failureCauses || []).forEach(c => { if (causeCounts[c] !== undefined) causeCounts[c]++; }));
  const totalCauses = Object.values(causeCounts).reduce((a, b) => a + b, 0);

  return (
    <div>
      <PageTitle>⬡ Executive Summary Dashboard</PageTitle>

      <Row>
        <Col style={{ maxWidth: 220 }}>
          <Field label="Reporting Month">
            <select style={S.select} value={month} onChange={e => setMonth(e.target.value)}>
              {months.map(m => <option key={m}>{m}</option>)}
              {!months.length && <option value={currentMonth}>{currentMonth}</option>}
            </select>
          </Field>
        </Col>
        <Col style={{ display: "flex", alignItems: "flex-end", paddingBottom: 12 }}>
          <span style={S.meta}>{logs.length} shifts · {month}</span>
        </Col>
      </Row>

      {logs.length === 0 && <Empty text="No data for selected month. Select a month with recorded shifts." />}

      {logs.length > 0 && (
        <>
          {/* ── Top KPI Strip ── */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 12, marginBottom: 24 }}>
            <KpiCard label="Overall Efficiency" value={`${kpi.overallEfficiency}%`} col={statusColor(kpi.overallEfficiency)} delta={delta(kpi.overallEfficiency, prevKpi.overallEfficiency)} />
            <KpiCard label="Shifts On Target" value={`${kpi.shiftsOnTarget}/${kpi.totalShifts}`} col={statusColor(kpi.onTargetRate)} delta={delta(kpi.onTargetRate, prevKpi.onTargetRate)} suffix="%" />
            <KpiCard label="Total Downtime" value={`${totalDTHrs.toFixed(1)}h`} col={totalDTHrs > 40 ? "#ff4d6d" : "#00e5a0"} invertDelta />
            <KpiCard label="Avg Maint Response" value={`${avgResp.toFixed(0)} min`} col={avgResp > 30 ? "#f5c518" : "#00e5a0"} invertDelta />
            <KpiCard label="QC Pass Rate" value={qcPassRate !== null ? `${qcPassRate}%` : "—"} col={qcPassRate >= 95 ? "#00e5a0" : qcPassRate >= 80 ? "#f5c518" : "#ff4d6d"} />
            <KpiCard label="Bonus Units Earned" value={kpi.totalBonusUnits.toLocaleString()} col="#f5c518" />
            {activeDT.length > 0 && <KpiCard label="Active Alarms" value={activeDT.length} col="#ff4d6d" blink />}
          </div>

          {/* ── Section Efficiency Bars ── */}
          <Card title="Section Efficiency — Month Average">
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 16, marginTop: 8 }}>
              {[
                { label: "Die Bonding", val: kpi.avgDB, prev: prevKpi.avgDB },
                { label: "Wire Bonding", val: kpi.avgWB, prev: prevKpi.avgWB },
                { label: "Dispensing", val: kpi.avgDisp, prev: prevKpi.avgDisp },
                { label: "Sorting & Taping", val: kpi.avgTape, prev: prevKpi.avgTape },
              ].map(sec => (
                <div key={sec.label}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                    <span style={{ fontSize: 11, color: "#c8dae8" }}>{sec.label}</span>
                    <span style={{ fontSize: 13, fontWeight: 700, color: statusColor(sec.val) }}>{sec.val}%</span>
                  </div>
                  <div style={{ height: 8, background: "#1e3347", borderRadius: 4, overflow: "hidden", position: "relative" }}>
                    <div style={{ height: "100%", width: `${Math.min(100, sec.val)}%`, background: statusColor(sec.val), borderRadius: 4, transition: "width 0.5s" }} />
                    <div style={{ position: "absolute", top: 0, left: "85%", width: 1, height: "100%", background: "#f5c51844" }} title="85% threshold" />
                  </div>
                  {sec.prev > 0 && (
                    <div style={{ fontSize: 9, color: sec.val >= sec.prev ? "#00e5a0" : "#ff4d6d", marginTop: 3 }}>
                      {sec.val >= sec.prev ? "▲" : "▼"} {Math.abs(sec.val - sec.prev)}% vs last month
                    </div>
                  )}
                </div>
              ))}
            </div>
          </Card>

          <div style={S.grid3}>
            {/* ── Failure Cause Breakdown ── */}
            <Card title="Failure Cause Breakdown">
              {totalCauses === 0 && <div style={S.meta}>No target failures recorded this month.</div>}
              {totalCauses > 0 && (
                <div style={{ marginTop: 8 }}>
                  {Object.entries(causeCounts).map(([cause, count]) => {
                    const share = totalCauses ? Math.round((count / totalCauses) * 100) : 0;
                    const col = cause === "Machine" ? "#ff4d6d" : cause === "Material" ? "#f5c518" : "#aaaaff";
                    return (
                      <div key={cause} style={{ marginBottom: 12 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                          <span style={{ fontSize: 11, color: col }}>{cause === "Machine" ? "🔧" : cause === "Material" ? "📦" : "👷"} {cause}</span>
                          <span style={{ fontSize: 12, fontWeight: 700, color: col }}>{count} events ({share}%)</span>
                        </div>
                        <div style={{ height: 5, background: "#1e3347", borderRadius: 3, overflow: "hidden" }}>
                          <div style={{ height: "100%", width: `${share}%`, background: col, borderRadius: 3 }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </Card>

            {/* ── Top Performers ── */}
            <Card title="Top Performers — Bonus Units">
              {kpi.topPerformers.length === 0 && <div style={S.meta}>No bonus units earned this month.</div>}
              {kpi.topPerformers.map(([uid, data], i) => (
                <div key={uid} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: "1px solid #1e3347" }}>
                  <span style={{ fontSize: 20, width: 28, textAlign: "center" }}>{["🥇", "🥈", "🥉"][i]}</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "#eaf4fc" }}>{data.name}</div>
                    <div style={{ fontSize: 10, color: "#5a7a8a" }}>{uid}</div>
                  </div>
                  <span style={{ fontSize: 14, fontWeight: 700, color: "#f5c518" }}>+{Math.round(data.bonus).toLocaleString()}</span>
                </div>
              ))}
            </Card>

            {/* ── Active Alarms ── */}
            <Card title="Live Machine Status">
              {activeDT.length === 0 && (
                <div style={{ textAlign: "center", padding: "20px 0" }}>
                  <div style={{ fontSize: 28 }}>✅</div>
                  <div style={{ fontSize: 12, color: "#00e5a0", marginTop: 6 }}>All machines operational</div>
                </div>
              )}
              {activeDT.map(d => {
                const hrs = (Date.now() - new Date(d.startTime).getTime()) / 3600000;
                const alarm = hrs > 24;
                return (
                  <div key={d.id} style={{ padding: "8px 0", borderBottom: "1px solid #1e3347" }}>
                    <div style={{ display: "flex", justifyContent: "space-between" }}>
                      <span style={{ fontSize: 12, fontWeight: 700, color: alarm ? "#ff4d6d" : "#f5c518" }}>{d.machineId}</span>
                      <span style={{ fontSize: 11, color: alarm ? "#ff4d6d" : "#f5c518", fontWeight: 700 }}>{hrs.toFixed(1)}h {alarm ? "🔴" : "🟡"}</span>
                    </div>
                    <div style={{ fontSize: 10, color: "#5a7a8a" }}>{d.section} · {d.category}</div>
                  </div>
                );
              })}
            </Card>
          </div>

          {/* ── Trainee Progress Summary ── */}
          {db.users.filter(u => u.role === ROLES.TRAINEE && u.active).length > 0 && (
            <Card title="Trainee Development Summary">
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 12 }}>
                {db.users.filter(u => u.role === ROLES.TRAINEE && u.active).map(t => {
                  const tevs = (db.traineeEvals || []).filter(e => e.traineeId === t.id);
                  const latest = tevs[tevs.length - 1];
                  const EVAL_SKILLS_IDS = ["machine_handling","quality_awareness","speed_consistency","troubleshooting","documentation","safety_compliance"];
                  const avg = latest ? (EVAL_SKILLS_IDS.reduce((s, id) => s + (latest.scores?.[id] || 0), 0) / EVAL_SKILLS_IDS.length).toFixed(1) : null;
                  const mentor = db.users.find(u => u.id === t.mentorId);

                  // output this month
                  const mLogs = db.shiftLogs.filter(l => monthKey(l.date) === month && (l.sections?.dbwb?.personnel || []).includes(t.id));
                  let mTgt = 0, mAct = 0;
                  mLogs.forEach(log => {
                    const shift = SHIFTS.find(s => s.id === log.shiftId) || SHIFTS[0];
                    const effHrs = effectiveHours(shift.hours, log.orderChanges, log.materialWaitHours);
                    mTgt += TRAINEE_DBWB_UPH * effHrs;
                    mAct += ((log.sections.dbwb.dbActual || 0) + (log.sections.dbwb.wbActual || 0)) / 2 / ((log.sections.dbwb.personnel || []).length || 1);
                  });
                  const outPct = pct(mAct, mTgt);
                  const rec = latest?.recommendation;

                  return (
                    <div key={t.id} style={{ background: "#07111e", border: "1px solid #1e3347", borderRadius: 8, padding: 14 }}>
                      <div style={{ fontWeight: 700, color: "#eaf4fc", marginBottom: 4 }}>{t.name}</div>
                      <div style={{ fontSize: 10, color: "#5a7a8a", marginBottom: 8 }}>Mentor: {mentor?.name || "Unassigned"}</div>
                      <div style={{ display: "flex", gap: 10 }}>
                        <div>
                          <div style={{ fontSize: 9, color: "#5a7a8a" }}>OUTPUT</div>
                          <div style={{ fontSize: 14, fontWeight: 700, color: statusColor(outPct) }}>{mTgt ? `${outPct}%` : "—"}</div>
                        </div>
                        <div>
                          <div style={{ fontSize: 9, color: "#5a7a8a" }}>SKILL AVG</div>
                          <div style={{ fontSize: 14, fontWeight: 700, color: avg ? (Number(avg) >= 4 ? "#00e5a0" : Number(avg) >= 3 ? "#f5c518" : "#ff4d6d") : "#5a7a8a" }}>{avg || "—"}/5</div>
                        </div>
                        {rec && (
                          <div>
                            <div style={{ fontSize: 9, color: "#5a7a8a" }}>STATUS</div>
                            <div style={{ fontSize: 10, fontWeight: 700, color: rec === "promote" ? "#00e5a0" : rec === "concern" ? "#ff4d6d" : "#f5c518" }}>
                              {rec === "promote" ? "PROMOTE" : rec === "concern" ? "CONCERN" : rec === "reassign" ? "REASSIGN" : "TRAINING"}
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </Card>
          )}
        </>
      )}
    </div>
  );
}

function KpiCard({ label, value, col, delta, invertDelta, suffix, blink }) {
  return (
    <div style={{ ...S.card, position: "relative", overflow: "hidden" }}>
      {blink && <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 2, background: "#ff4d6d", animation: "pulse 1s infinite" }} />}
      <div style={{ fontSize: 9, color: "#5a7a8a", letterSpacing: 1.5, marginBottom: 6, textTransform: "uppercase" }}>{label}</div>
      <div style={{ fontSize: 24, fontWeight: 700, color: col || "#eaf4fc" }}>{value}</div>
      {delta && (
        <div style={{ fontSize: 9, marginTop: 4, color: (invertDelta ? !delta.up : delta.up) ? "#00e5a0" : "#ff4d6d" }}>
          {delta.up ? "▲" : "▼"} {delta.val}{suffix || ""} vs prev month
        </div>
      )}
    </div>
  );
}

// ============================================================
// SI ACCOUNTABILITY TAB
// ============================================================
function SIAccountabilityTab({ db, currentUser, isExec }) {
  const months = [...new Set(db.shiftLogs.map(l => monthKey(l.date)))].sort().reverse();
  const [month, setMonth] = useState(months[0] || today().slice(0, 7));

  const siUsers = db.users.filter(u => u.role === ROLES.SHIFT_INCHARGE && u.active);
  const allLogs = db.shiftLogs.filter(l => monthKey(l.date) === month);

  // Expected shifts per SI: estimate based on 3 shifts/day × days in month / 3 SI = days in month
  const daysInMonth = new Date(month.slice(0, 4), Number(month.slice(5, 7)), 0).getDate();
  const expectedShiftsPerSI = daysInMonth; // 1 shift/day/SI

  function calcSIScore(siId) {
    const siLogs = allLogs.filter(l => l.shiftInchargeId === siId);
    const totalShifts = siLogs.length;

    // Data completeness: all required fields present
    let completeEntries = 0;
    let onTimeEntries = 0;
    let justifiedFailures = 0;
    let unjustifiedFailures = 0;
    let doubleEntryCompliance = 0;
    let qcCompliance = 0;

    siLogs.forEach(log => {
      const hasDB = log.sections?.dbwb?.dbActual !== undefined;
      const hasWB = log.sections?.dbwb?.wbActual !== undefined;
      const hasDisp = log.sections?.dispensing?.actual !== undefined;
      const hasTape = log.sections?.taping?.reelsActual !== undefined;
      const hasDB2 = log.sections?.dbwb?.dbActual2 !== undefined;
      if (hasDB && hasWB && hasDisp && hasTape) completeEntries++;
      if (hasDB2) doubleEntryCompliance++;

      // Was entry saved same day?
      const savedDay = (log.savedAt || "").slice(0, 10);
      if (savedDay === log.date) onTimeEntries++;

      // Check if failures were justified
      const shift = SHIFTS.find(s => s.id === log.shiftId) || SHIFTS[0];
      const effHrs = effectiveHours(shift.hours, log.orderChanges, log.materialWaitHours);
      const users = (ids) => (ids || []).map(id => db.users.find(u => u.id === id)).filter(Boolean);
      const dbwb = calcDBWBSection(users(log.sections?.dbwb?.personnel || []), effHrs, log.activeDieBonders || []);
      const disp = calcDispensingSection(log.sections?.dispensing?.activeMachines || 0, effHrs);
      const tape = calcTapingSection(users(log.sections?.taping?.personnel || []), log.sections?.taping?.activeMachines || 0, effHrs);

      const dbP = pct(log.sections?.dbwb?.dbActual, dbwb.targetTotal);
      const wbP = pct(log.sections?.dbwb?.wbActual, dbwb.targetTotal);
      const dpP = pct(log.sections?.dispensing?.actual, disp.targetTotal);
      const tpP = pct(log.sections?.taping?.reelsActual, tape.targetTotal);
      const overall = (dbP + wbP + dpP + tpP) / 4;

      if (overall < 85) {
        const hasJustification = (log.failureCauses?.length > 0) || (log.notes?.trim().length > 0) || log.voiceNote;
        if (hasJustification) justifiedFailures++;
        else unjustifiedFailures++;
      }

      // QC compliance: was QC done before shift?
      const shiftQC = (db.qcLogs || []).filter(q => q.date === log.date && q.shiftId === log.shiftId);
      if (shiftQC.length > 0) qcCompliance++;
    });

    // Score components (each out of 100, weighted)
    const entryRate = totalShifts ? Math.round((completeEntries / totalShifts) * 100) : 0;
    const onTimeRate = totalShifts ? Math.round((onTimeEntries / totalShifts) * 100) : 0;
    const doubleEntryRate = totalShifts ? Math.round((doubleEntryCompliance / totalShifts) * 100) : 0;
    const justificationRate = (justifiedFailures + unjustifiedFailures) > 0
      ? Math.round((justifiedFailures / (justifiedFailures + unjustifiedFailures)) * 100) : 100;
    const qcRate = totalShifts ? Math.round((qcCompliance / totalShifts) * 100) : 0;

    // Weighted overall: entry 30%, ontime 20%, double-entry 20%, justification 20%, qc 10%
    const overall = Math.round(
      entryRate * 0.30 + onTimeRate * 0.20 + doubleEntryRate * 0.20 + justificationRate * 0.20 + qcRate * 0.10
    );

    return {
      totalShifts, completeEntries, onTimeEntries, doubleEntryCompliance,
      justifiedFailures, unjustifiedFailures,
      entryRate, onTimeRate, doubleEntryRate, justificationRate, qcRate, overall,
      grade: overall >= 90 ? "A" : overall >= 75 ? "B" : overall >= 60 ? "C" : "D",
      gradeCol: overall >= 90 ? "#00e5a0" : overall >= 75 ? "#f5c518" : overall >= 60 ? "#f5a500" : "#ff4d6d",
    };
  }

  return (
    <div>
      <PageTitle>Shift Incharge Accountability</PageTitle>
      <Row>
        <Col style={{ maxWidth: 220 }}>
          <Field label="Month">
            <select style={S.select} value={month} onChange={e => setMonth(e.target.value)}>
              {months.map(m => <option key={m}>{m}</option>)}
              {!months.length && <option value={today().slice(0, 7)}>{today().slice(0, 7)}</option>}
            </select>
          </Field>
        </Col>
      </Row>

      <Info>
        Scoring weights: <b>Data Completeness 30%</b> · <b>On-Time Entry 20%</b> · <b>Double-Entry Compliance 20%</b> · <b>Failure Justification 20%</b> · <b>QC Compliance 10%</b>
      </Info>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(340px, 1fr))", gap: 16, margin: "20px 0" }}>
        {siUsers.map(si => {
          const score = calcSIScore(si.id);
          return (
            <div key={si.id} style={{ ...S.card, borderColor: score.gradeCol + "44" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 16 }}>
                <div style={{ width: 52, height: 52, borderRadius: "50%", background: score.gradeCol + "22", border: `2px solid ${score.gradeCol}`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <span style={{ fontSize: 22, fontWeight: 700, color: score.gradeCol }}>{score.grade}</span>
                </div>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: "#eaf4fc" }}>{si.name}</div>
                  <div style={{ fontSize: 10, color: "#5a7a8a" }}>{si.id} · {score.totalShifts} shifts logged</div>
                </div>
                <div style={{ marginLeft: "auto", textAlign: "right" }}>
                  <div style={{ fontSize: 26, fontWeight: 700, color: score.gradeCol }}>{score.overall}%</div>
                  <div style={{ fontSize: 9, color: "#5a7a8a" }}>OVERALL</div>
                </div>
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {[
                  { label: "Data Completeness", val: score.entryRate, weight: "30%" },
                  { label: "On-Time Entry", val: score.onTimeRate, weight: "20%" },
                  { label: "Double-Entry Compliance", val: score.doubleEntryRate, weight: "20%" },
                  { label: "Failure Justification", val: score.justificationRate, weight: "20%" },
                  { label: "QC Compliance", val: score.qcRate, weight: "10%" },
                ].map(item => (
                  <div key={item.label}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                      <span style={{ fontSize: 10, color: "#c8dae8" }}>{item.label} <span style={{ color: "#5a7a8a" }}>({item.weight})</span></span>
                      <span style={{ fontSize: 11, fontWeight: 700, color: statusColor(item.val) }}>{item.val}%</span>
                    </div>
                    <div style={{ height: 4, background: "#1e3347", borderRadius: 2, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${item.val}%`, background: statusColor(item.val), borderRadius: 2 }} />
                    </div>
                  </div>
                ))}
              </div>

              {score.unjustifiedFailures > 0 && (
                <div style={{ marginTop: 12, background: "#ff4d6d10", border: "1px solid #ff4d6d33", borderRadius: 6, padding: "6px 10px", fontSize: 11, color: "#ff4d6d" }}>
                  ⚠ {score.unjustifiedFailures} shift{score.unjustifiedFailures > 1 ? "s" : ""} below target with no justification recorded
                </div>
              )}
            </div>
          );
        })}
      </div>

      {siUsers.length > 0 && (
        <>
          <Subtitle>Comparative Summary</Subtitle>
          <div style={S.tableWrap}>
            <table style={S.tbl}>
              <thead><tr>{["SI ID","Name","Shifts","Complete","On-Time","Dbl-Entry","Justified","QC","Score","Grade"].map(h => <th key={h} style={S.th}>{h}</th>)}</tr></thead>
              <tbody>
                {siUsers.map(si => {
                  const sc = calcSIScore(si.id);
                  return (
                    <tr key={si.id}>
                      <td style={S.td}>{si.id}</td>
                      <td style={S.td}>{si.name}</td>
                      <td style={S.td}>{sc.totalShifts}</td>
                      <td style={{ ...S.td, color: statusColor(sc.entryRate) }}>{sc.entryRate}%</td>
                      <td style={{ ...S.td, color: statusColor(sc.onTimeRate) }}>{sc.onTimeRate}%</td>
                      <td style={{ ...S.td, color: statusColor(sc.doubleEntryRate) }}>{sc.doubleEntryRate}%</td>
                      <td style={{ ...S.td, color: statusColor(sc.justificationRate) }}>{sc.justificationRate}%</td>
                      <td style={{ ...S.td, color: statusColor(sc.qcRate) }}>{sc.qcRate}%</td>
                      <td style={{ ...S.td, color: sc.gradeCol, fontWeight: 700, fontSize: 13 }}>{sc.overall}%</td>
                      <td style={{ ...S.td, color: sc.gradeCol, fontWeight: 700, fontSize: 16 }}>{sc.grade}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </>
      )}
    </div>
  );
}
