// MONTHLY PLANNER TAB (GANTT)
// ============================================================
function MonthlyPlannerTab({ db }) {
  const { useState } = React;
  const now = new Date();
  const [month, setMonth] = useState(now.toISOString().slice(0,7));

  const [yr, mo] = month.split("-").map(Number);
  const daysInMonth = new Date(yr, mo, 0).getDate();
  const days = Array.from({length:daysInMonth},(_,i)=>i+1);

  const orders = db.productionOrders.filter(o=>{
    const due = new Date(o.dueDate);
    const start = new Date(o.createdAt||o.dueDate);
    return (due.getFullYear()===yr&&due.getMonth()+1===mo) ||
           (start.getFullYear()===yr&&start.getMonth()+1===mo);
  });

  const statusColor = s => s===ORDER_STATUS.COMPLETED?"#00e5a0":s===ORDER_STATUS.IN_PROGRESS?"#f5c518":s===ORDER_STATUS.ON_HOLD?"#ff9900":"#5a7a8a";

  function barStyle(o) {
    const start = new Date(o.createdAt||o.dueDate);
    const due = new Date(o.dueDate);
    const startDay = start.getFullYear()===yr&&start.getMonth()+1===mo ? start.getDate() : 1;
    const endDay = due.getFullYear()===yr&&due.getMonth()+1===mo ? due.getDate() : daysInMonth;
    const left = ((startDay-1)/daysInMonth)*100;
    const width = Math.max(((endDay-startDay+1)/daysInMonth)*100, 2);
    const overdue = o.status!==ORDER_STATUS.COMPLETED && due < new Date();
    const color = overdue?"#ff4d6d":statusColor(o.status);
    return {left:left+"%", width:width+"%", background:color+"33", border:"1px solid "+color, color, overdue};
  }

  const today = now.getDate();
  const todayPct = mo===now.getMonth()+1&&yr===now.getFullYear() ? ((today-1)/daysInMonth)*100 : null;

  return (
    <div>
      <PageTitle>📅 Monthly Production Planner</PageTitle>
      <Row><Col style={{maxWidth:220}}><Field label="Month"><input style={S.input} type="month" value={month} onChange={e=>setMonth(e.target.value)} /></Field></Col></Row>

      <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
        {[["Pending","#5a7a8a"],["In Progress","#f5c518"],["Completed","#00e5a0"],["On Hold","#ff9900"],["Overdue","#ff4d6d"]].map(([l,c])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"#c8dae8"}}>
            <div style={{width:12,height:12,borderRadius:2,background:c+"44",border:"1px solid "+c}} />
            {l}
          </div>
        ))}
      </div>

      {orders.length===0?<Empty text="No orders due or started this month." />:(
        <div style={{overflowX:"auto"}}>
          <div style={{minWidth:800}}>
            {/* Day header */}
            <div style={{display:"flex",marginBottom:4,paddingLeft:220}}>
              {days.map(d=>(
                <div key={d} style={{flex:1,textAlign:"center",fontSize:9,color:d===today&&mo===now.getMonth()+1&&yr===now.getFullYear()?"#00e5a0":"#5a7a8a",fontWeight:d===today?700:400}}>
                  {d}
                </div>
              ))}
            </div>
            {/* Gantt rows */}
            {orders.map(o=>{
              const bs = barStyle(o);
              return (
                <div key={o.id} style={{display:"flex",alignItems:"center",marginBottom:6,height:36}}>
                  <div style={{width:220,minWidth:220,paddingRight:12}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#eaf4fc",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.orderRef}</div>
                    <div style={{fontSize:9,color:"#5a7a8a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.customer} · {o.ledType}</div>
                  </div>
                  <div style={{flex:1,position:"relative",height:"100%",background:"#0d1f2f",borderRadius:4,border:"1px solid #1e3347"}}>
                    {todayPct!==null && <div style={{position:"absolute",left:todayPct+"%",top:0,bottom:0,width:1,background:"#00e5a066",zIndex:1}} />}
                    <div style={{position:"absolute",top:4,bottom:4,borderRadius:3,...bs,display:"flex",alignItems:"center",paddingLeft:6,overflow:"hidden",zIndex:2}}>
                      <span style={{fontSize:9,fontWeight:700,whiteSpace:"nowrap",color:bs.color}}>{o.status}{bs.overdue?" ⚠":""} · {Number(o.targetQty).toLocaleString()} pcs</span>
                    </div>
                  </div>
                  <div style={{width:90,textAlign:"right",fontSize:9,color:bs.overdue?"#ff4d6d":"#5a7a8a",paddingLeft:8}}>{o.dueDate}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// YIELD TRACKER TAB
// ============================================================
function YieldTrackerTab({ db, persist_yield, persist_order, currentUser }) {
  const { useState, useRef } = React;
  const blank = { orderId:"", machineId:"", binData:{}, notes:"" };
  const [form, setForm] = useState(blank);
  const [flash, setFlash] = useState(null);
  const [saving, setSaving] = useState(false);
  const [savingNames, setSavingNames] = useState(false);
  const [photoPreview, setPhotoPreview] = useState(null);
  const [filterOrder, setFilterOrder] = useState("");
  const [binNames, setBinNames] = useState({});
  const [showNaming, setShowNaming] = useState(false);
  const fileRef = useRef(null);

  const canName = CAN_NAME_BINS.includes(currentUser.role);
  const selOrder = db.productionOrders.find(o=>o.id===form.orderId);

  // When order changes, load its saved BIN names
  function selectOrder(id) {
    const o = db.productionOrders.find(x=>x.id===id);
    setBinNames(o?.binNames||{});
    setForm(f=>({...f, orderId:id, binData:{}}));
  }

  // Display label for a bin: "BIN 4" or "BIN 4 (C21)"
  function binLabel(bin) {
    const custom = binNames[bin];
    return custom ? bin+" ("+custom+")" : bin;
  }

  function setBin(bin, val) {
    setForm(f=>({...f, binData:{...f.binData,[bin]:Number(val)||0}}));
  }

  function setName(bin, val) {
    setBinNames(n=>({...n,[bin]:val}));
  }

  async function saveNames() {
    if (!selOrder){ setFlash({t:"error",m:"Select an order first."}); return; }
    setSavingNames(true);
    try {
      await persist_order({...selOrder, binNames});
      setFlash({t:"success",m:"✓ BIN names saved for "+selOrder.orderRef}); setTimeout(()=>setFlash(null),3000);
    } catch(e){ setFlash({t:"error",m:"Save failed: "+e.message}); }
    setSavingNames(false);
  }

  function calcYield() {
    if (!selOrder) return null;
    const bins = form.binData;
    const total = Object.values(bins).reduce((s,v)=>s+v,0);
    if (total===0) return null;
    const rejectQty = BIN_REJECT.reduce((s,b)=>s+(bins["BIN "+b]||0),0);
    const rejectPct = (rejectQty/total)*100;
    const customerBins = selOrder.customerBins||[];
    const customerQty = customerBins.reduce((s,b)=>s+(bins[b]||0),0);
    const customerYieldPct = (customerQty/total)*100;
    const reels = Math.floor(total/REEL_SIZE);
    const partial = total%REEL_SIZE;
    const passed = rejectPct<2 && customerYieldPct>=(selOrder.targetYieldPct||90);
    return {total,rejectPct:rejectPct.toFixed(2),customerYieldPct:customerYieldPct.toFixed(2),reels,partial,passed};
  }

  function handlePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setPhotoPreview(ev.target.result);
    reader.readAsDataURL(file);
  }

  async function save() {
    if (!form.orderId){ setFlash({t:"error",m:"Select an order."}); return; }
    const calc = calcYield();
    if (!calc){ setFlash({t:"error",m:"Enter BIN quantities first."}); return; }
    setSaving(true);
    const yl = {
      id:"YL-"+Date.now(), orderId:form.orderId, machineId:form.machineId,
      binData:form.binData, binNames:binNames,
      totalSorted:calc.total, rejectPct:calc.rejectPct,
      customerYieldPct:calc.customerYieldPct, reelsProduced:calc.reels,
      partialReel:calc.partial, passed:calc.passed,
      photoUrl:photoPreview||null, notes:form.notes,
      loggedBy:currentUser.id, loggedAt:new Date().toISOString()
    };
    try {
      await persist_yield(yl);
      setForm(blank); setPhotoPreview(null); setBinNames({});
      setFlash({t:"success",m:"✓ Yield logged successfully."}); setTimeout(()=>setFlash(null),3000);
    } catch(e){ setFlash({t:"error",m:"Save failed: "+e.message}); }
    setSaving(false);
  }

  const calc = calcYield();
  const filteredLogs = filterOrder ? db.yieldLogs.filter(y=>y.orderId===filterOrder) : db.yieldLogs;

  return (
    <div>
      <PageTitle>🔬 Yield Tracker</PageTitle>
      {flash && <Flash type={flash.t}>{flash.m}</Flash>}

      <Card title="Log Sorting / Yield Data">

        {/* Order + Machine selection */}
        <Row>
          <Col><Field label="Production Order">
            <select style={S.select} value={form.orderId} onChange={e=>selectOrder(e.target.value)}>
              <option value="">— Select order —</option>
              {db.productionOrders.filter(o=>o.status===ORDER_STATUS.IN_PROGRESS||o.status===ORDER_STATUS.COMPLETED).map(o=>(
                <option key={o.id} value={o.id}>{o.orderRef} | {o.customer} | {o.ledType}</option>
              ))}
            </select>
          </Field></Col>
          <Col style={{maxWidth:220}}><Field label="Sorting Machine ID">
            <input style={S.input} value={form.machineId} onChange={e=>setForm(f=>({...f,machineId:e.target.value.toUpperCase()}))} placeholder="e.g. SORT-01" />
          </Field></Col>
        </Row>

        {/* Order summary bar */}
        {selOrder && (
          <div style={{background:"#07111e",border:"1px solid #1e3347",borderRadius:8,padding:12,marginBottom:16,fontSize:11}}>
            <span style={{color:"#5a7a8a",marginRight:16}}>Customer: <b style={{color:"#c8dae8"}}>{selOrder.customer}</b></span>
            <span style={{color:"#5a7a8a",marginRight:16}}>Customer BINs: <b style={{color:"#00e5a0"}}>{(selOrder.customerBins||[]).join(", ")||"None set"}</b></span>
            <span style={{color:"#5a7a8a"}}>Target Yield: <b style={{color:"#f5c518"}}>{selOrder.targetYieldPct}%</b></span>
          </div>
        )}

        {/* BIN Naming Section */}
        {selOrder && canName && (
          <div style={{background:"#07111e",border:"1px solid #1e3347",borderRadius:8,marginBottom:16,overflow:"hidden"}}>
            <div
              style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",cursor:"pointer",userSelect:"none"}}
              onClick={()=>setShowNaming(v=>!v)}
            >
              <div style={{fontSize:10,fontWeight:700,color:"#00e5a0",letterSpacing:1.5}}>
                🏷 BIN NAMING — SET CUSTOM NAMES FOR THIS ORDER
                <span style={{fontSize:9,color:"#5a7a8a",fontWeight:400,marginLeft:12}}>
                  {Object.values(binNames).filter(Boolean).length} of 19 named
                </span>
              </div>
              <span style={{color:"#5a7a8a",fontSize:12}}>{showNaming?"▲":"▼"}</span>
            </div>

            {showNaming && (
              <div style={{padding:"0 14px 14px"}}>
                <div style={{fontSize:11,color:"#5a7a8a",marginBottom:12}}>
                  Enter a custom label for each BIN as it appears on the sorting machine for this order. Optional — unnamed BINs display as BIN 0, BIN 1 etc.
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8,marginBottom:14}}>
                  {BIN_LABELS.map(bin=>{
                    const isReject = BIN_REJECT.includes(parseInt(bin.replace("BIN ","")));
                    const isGood   = BIN_GOOD.includes(parseInt(bin.replace("BIN ","")));
                    const isCust   = (selOrder.customerBins||[]).includes(bin);
                    const borderC  = isReject?"#ff4d6d33":isCust?"#00e5a033":isGood?"#f5c51833":"#1e3347";
                    const labelC   = isReject?"#ff4d6d":isCust?"#00e5a0":isGood?"#f5c518":"#5a7a8a";
                    return (
                      <div key={bin} style={{border:"1px solid "+borderC,borderRadius:6,padding:"6px 8px",background:"#0d1f2f"}}>
                        <div style={{fontSize:9,color:labelC,fontWeight:700,marginBottom:4}}>
                          {bin}
                          {isCust?" ★":""}
                          {isReject?" ✗":""}
                          {isGood&&!isCust?" ✓":""}
                        </div>
                        <input
                          style={{...S.input,padding:"4px 8px",fontSize:11}}
                          value={binNames[bin]||""}
                          onChange={e=>setName(bin,e.target.value)}
                          placeholder={"e.g. C21, A42, Cool White…"}
                        />
                      </div>
                    );
                  })}
                </div>
                <div style={{textAlign:"right"}}>
                  <button style={S.btnPrimary} onClick={saveNames} disabled={savingNames}>
                    {savingNames?"SAVING...":"💾 SAVE BIN NAMES FOR THIS ORDER"}
                  </button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* Read-only BIN name summary for non-naming roles when names exist */}
        {selOrder && !canName && Object.keys(binNames).length>0 && (
          <div style={{background:"#07111e",border:"1px solid #1e3347",borderRadius:8,padding:10,marginBottom:16,fontSize:11}}>
            <span style={{color:"#5a7a8a",letterSpacing:1,fontSize:9,fontWeight:700}}>BIN NAMES FOR THIS ORDER: </span>
            {BIN_LABELS.filter(b=>binNames[b]).map(b=>(
              <span key={b} style={{marginRight:10,color:"#c8dae8"}}>{b}: <b style={{color:"#00e5a0"}}>{binNames[b]}</b></span>
            ))}
          </div>
        )}

        {/* Photo upload */}
        <SubHeading>Upload Sorting Machine Screen Photo</SubHeading>
        <div style={{marginBottom:16}}>
          <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhoto} />
          <button style={{...S.chip,marginRight:12}} onClick={()=>fileRef.current.click()}>📷 Upload Photo</button>
          {photoPreview && <span style={{fontSize:11,color:"#00e5a0"}}>✓ Photo attached (AI reading coming soon)</span>}
        </div>
        {photoPreview && <img src={photoPreview} alt="Sorting screen" style={{maxWidth:"100%",maxHeight:200,borderRadius:8,border:"1px solid #1e3347",marginBottom:16,objectFit:"contain"}} />}

        {/* BIN Data Entry */}
        <SubHeading>BIN Data Entry</SubHeading>
        <div style={{fontSize:11,color:"#5a7a8a",marginBottom:12}}>Enter unit count for each BIN as shown on sorting machine screen. Custom names shown where set.</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:8,marginBottom:16}}>
          {BIN_LABELS.map(bin=>{
            const binNum   = parseInt(bin.replace("BIN ",""));
            const isReject = BIN_REJECT.includes(binNum);
            const isGood   = BIN_GOOD.includes(binNum);
            const isCust   = selOrder&&(selOrder.customerBins||[]).includes(bin);
            const customName = binNames[bin];
            const bg       = isReject?"#ff4d6d08":isCust?"#00e5a010":isGood?"#f5c51808":"#07111e";
            const borderC  = isReject?"#ff4d6d33":isCust?"#00e5a033":isGood?"#f5c51833":"#1e3347";
            const labelC   = isReject?"#ff4d6d":isCust?"#00e5a0":isGood?"#f5c518":"#5a7a8a";
            return (
              <div key={bin} style={{background:bg,border:"1px solid "+borderC,borderRadius:6,padding:"6px 8px"}}>
                <div style={{fontSize:9,color:labelC,fontWeight:700,marginBottom:2}}>
                  {bin}{isCust?" ★":""}{isReject?" ✗":""}
                </div>
                {customName && (
                  <div style={{fontSize:10,color:"#c8dae8",fontStyle:"italic",marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    ({customName})
                  </div>
                )}
                <input
                  style={{...S.input,padding:"4px 8px",fontSize:12,textAlign:"right"}}
                  type="number" min="0"
                  value={form.binData[bin]||""}
                  onChange={e=>setBin(bin,e.target.value)}
                  placeholder="0"
                />
              </div>
            );
          })}
        </div>

        {/* PASS/FAIL Summary */}
        {calc && (
          <div style={{background:calc.passed?"#00e5a010":"#ff4d6d10",border:"1px solid "+(calc.passed?"#00e5a044":"#ff4d6d44"),borderRadius:8,padding:16,marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:calc.passed?"#00e5a0":"#ff4d6d",marginBottom:12}}>
              {calc.passed?"✓ PASS — Yield meets requirements":"⚠ FAIL — Yield does not meet requirements"}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10}}>
              {[
                ["Total Sorted",calc.total.toLocaleString()+" pcs","#eaf4fc"],
                ["Reject % (BIN 0, 13–18)",calc.rejectPct+"%",Number(calc.rejectPct)>=2?"#ff4d6d":"#00e5a0"],
                ["Customer BIN Yield",calc.customerYieldPct+"%",Number(calc.customerYieldPct)>=(selOrder?.targetYieldPct||90)?"#00e5a0":"#ff4d6d"],
                ["Full Reels",calc.reels+" × 10,000 pcs","#eaf4fc"],
                ["Partial Reel",calc.partial.toLocaleString()+" pcs","#eaf4fc"],
              ].map(([l,v,c])=>(
                <div key={l} style={{textAlign:"center"}}>
                  <div style={{fontSize:9,color:"#5a7a8a",letterSpacing:1.5}}>{l.toUpperCase()}</div>
                  <div style={{fontSize:18,fontWeight:700,color:c,marginTop:4}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        <Field label="Notes"><textarea style={S.ta} rows={2} value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Any remarks about this yield run..." /></Field>
        <div style={{textAlign:"right",marginTop:8}}>
          <button style={S.btnPrimary} onClick={save} disabled={saving}>{saving?"SAVING...":"LOG YIELD →"}</button>
        </div>
      </Card>

      {/* Yield History */}
      <Card title="Yield History">
        <Field label="Filter by Order">
          <select style={{...S.select,maxWidth:320}} value={filterOrder} onChange={e=>setFilterOrder(e.target.value)}>
            <option value="">All Orders</option>
            {db.productionOrders.map(o=><option key={o.id} value={o.id}>{o.orderRef} — {o.customer}</option>)}
          </select>
        </Field>
        {filteredLogs.length===0?<Empty text="No yield logs yet." />:(
          <div style={S.tableWrap}>
            <table style={S.tbl}>
              <thead>
                <tr>{["Order","Machine","Total Sorted","Reject %","Customer Yield %","Full Reels","Partial","BIN Names","Result","Logged By","Date"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr>
              </thead>
              <tbody>
                {filteredLogs.map(y=>{
                  const ord = db.productionOrders.find(o=>o.id===y.orderId);
                  const yBinNames = y.binNames||ord?.binNames||{};
                  const namedBins = Object.entries(yBinNames).filter(([,v])=>v).map(([k,v])=>k+" ("+v+")");
                  return (
                    <tr key={y.id}>
                      <td style={{...S.td,color:"#00e5a0",fontWeight:700}}>{ord?.orderRef||y.orderId}</td>
                      <td style={S.td}>{y.machineId||"—"}</td>
                      <td style={{...S.td,textAlign:"right"}}>{Number(y.totalSorted).toLocaleString()}</td>
                      <td style={{...S.td,color:Number(y.rejectPct)>=2?"#ff4d6d":"#00e5a0",fontWeight:700}}>{y.rejectPct}%</td>
                      <td style={{...S.td,color:Number(y.customerYieldPct)>=(ord?.targetYieldPct||90)?"#00e5a0":"#ff4d6d",fontWeight:700}}>{y.customerYieldPct}%</td>
                      <td style={{...S.td,textAlign:"right"}}>{y.reelsProduced}</td>
                      <td style={{...S.td,textAlign:"right"}}>{Number(y.partialReel).toLocaleString()}</td>
                      <td style={{...S.td,fontSize:10,color:"#5a7a8a",maxWidth:160}}>
                        {namedBins.length>0 ? namedBins.slice(0,4).join(", ")+(namedBins.length>4?"…":"") : "—"}
                      </td>
                      <td style={S.td}>
                        <span style={{background:y.passed?"#00e5a015":"#ff4d6d15",border:"1px solid "+(y.passed?"#00e5a044":"#ff4d6d44"),color:y.passed?"#00e5a0":"#ff4d6d",borderRadius:4,padding:"2px 8px",fontSize:10,fontWeight:700}}>
                          {y.passed?"PASS":"FAIL"}
                        </span>
                      </td>
                      <td style={S.td}>{y.loggedBy}</td>
                      <td style={S.td}>{y.loggedAt?y.loggedAt.slice(0,10):"—"}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </Card>
    </div>
  );
}

root.render(<App />);
</script>
</body>
</html>
