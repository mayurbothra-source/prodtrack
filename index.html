// ============================================================
function ExportTab({ db }) {
  const months = [...new Set(db.shiftLogs.map(l => monthKey(l.date)))].sort().reverse();
  const [month, setMonth] = useState(months[0] || today().slice(0, 7));
  const [exporting, setExporting] = useState(null);

  function buildCSV(rows, headers) {
    const escape = v => `"${String(v ?? "").replace(/"/g, '""')}"`;
    return [headers, ...rows.map(r => headers.map(h => escape(r[h] ?? r[headers.indexOf(h)] ?? "")))].map(r => r.join(",")).join("\n");
  }

  function downloadCSV(content, filename) {
    const blob = new Blob([content], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  }

  function exportShiftLogs() {
    setExporting("shifts");
    const logs = db.shiftLogs.filter(l => monthKey(l.date) === month);
    const rows = logs.map(log => {
      const shift = SHIFTS.find(s => s.id === log.shiftId) || SHIFTS[0];
      const effHrs = effectiveHours(shift.hours, log.orderChanges, log.materialWaitHours);
      const users = (ids) => (ids || []).map(id => db.users.find(u => u.id === id)).filter(Boolean);
      const dbwb = calcDBWBSection(users(log.sections?.dbwb?.personnel || []), effHrs, log.activeDieBonders || []);
      const disp = calcDispensingSection(log.sections?.dispensing?.activeMachines || 0, effHrs);
      const tape = calcTapingSection(users(log.sections?.taping?.personnel || []), log.sections?.taping?.activeMachines || 0, effHrs);
      return {
        "Date": log.date,
        "Shift": shift.name,
        "Shift Incharge": log.shiftInchargeId,
        "Effective Hours": effHrs.toFixed(1),
        "Order Changes": log.orderChanges,
        "Material Wait (hrs)": log.materialWaitHours,
        "DB Personnel": (log.sections?.dbwb?.personnel || []).join(";"),
        "DB Target": Math.round(dbwb.targetTotal),
        "DB Actual": log.sections?.dbwb?.dbActual || 0,
        "DB %": pct(log.sections?.dbwb?.dbActual, dbwb.targetTotal),
        "WB Target": Math.round(dbwb.targetTotal),
        "WB Actual": log.sections?.dbwb?.wbActual || 0,
        "WB %": pct(log.sections?.dbwb?.wbActual, dbwb.targetTotal),
        "Disp Machines": log.sections?.dispensing?.activeMachines || 0,
        "Disp Target": Math.round(disp.targetTotal),
        "Disp Actual": log.sections?.dispensing?.actual || 0,
        "Disp %": pct(log.sections?.dispensing?.actual, disp.targetTotal),
        "Tape Machines": log.sections?.taping?.activeMachines || 0,
        "Tape Target (reels)": tape.targetTotal.toFixed(2),
        "Tape Actual (reels)": log.sections?.taping?.reelsActual || 0,
        "Tape %": pct(log.sections?.taping?.reelsActual, tape.targetTotal),
        "Failure Causes": (log.failureCauses || []).join(";"),
        "Notes": log.notes || "",
        "Active Die Bonders": (log.activeDieBonders || []).join(";"),
      };
    });
    const headers = Object.keys(rows[0] || {});
    downloadCSV(buildCSV(rows, headers), `PRODTRACK_Shifts_${month}.csv`);
    setTimeout(() => setExporting(null), 1000);
  }

  function exportPersonnelReport() {
    setExporting("personnel");
    const logs = db.shiftLogs.filter(l => monthKey(l.date) === month);
    const acc = {};
    db.users.filter(u => PROD_ROLES.includes(u.role)).forEach(u => {
      acc[u.id] = { id: u.id, name: u.name, role: u.role, shifts: 0, dbwbTarget: 0, dbwbActual: 0, tapingTarget: 0, tapingActual: 0 };
    });
    logs.forEach(log => {
      const shift = SHIFTS.find(s => s.id === log.shiftId) || SHIFTS[0];
      const effHrs = effectiveHours(shift.hours, log.orderChanges, log.materialWaitHours);
      const dbwbP = log.sections?.dbwb?.personnel || [];
      dbwbP.forEach(pid => {
        if (!acc[pid]) return;
        const u = db.users.find(u => u.id === pid);
        const uph = [ROLES.OPERATOR, ROLES.SENIOR_OPERATOR].includes(u?.role) ? OPERATOR_DBWB_UPH : TRAINEE_DBWB_UPH;
        acc[pid].dbwbTarget += uph * effHrs;
        acc[pid].dbwbActual += ((log.sections.dbwb.dbActual || 0) + (log.sections.dbwb.wbActual || 0)) / 2 / (dbwbP.length || 1);
        acc[pid].shifts++;
      });
      const tapP = log.sections?.taping?.personnel || [];
      tapP.forEach(pid => {
        if (!acc[pid]) return;
        const u = db.users.find(u => u.id === pid);
        const rph = [ROLES.OPERATOR, ROLES.SENIOR_OPERATOR].includes(u?.role) ? OPERATOR_TAPING_UPH : TRAINEE_TAPING_UPH;
        acc[pid].tapingTarget += rph * effHrs;
        acc[pid].tapingActual += (log.sections.taping.reelsActual || 0) / (tapP.length || 1);
      });
    });
    const rows = Object.values(acc).map(a => ({
      "Employee ID": a.id,
      "Name": a.name,
      "Role": a.role,
      "Shifts Worked": a.shifts,
      "DB/WB Target (units)": Math.round(a.dbwbTarget),
      "DB/WB Actual (units)": Math.round(a.dbwbActual),
      "DB/WB Achievement %": pct(a.dbwbActual, a.dbwbTarget),
      "Taping Target (reels)": a.tapingTarget.toFixed(1),
      "Taping Actual (reels)": a.tapingActual.toFixed(1),
      "Taping Achievement %": pct(a.tapingActual, a.tapingTarget),
      "Bonus Units": Math.max(0, Math.round(a.dbwbActual - a.dbwbTarget)),
      "Month": month,
    }));
    const headers = Object.keys(rows[0] || {});
    downloadCSV(buildCSV(rows, headers), `PRODTRACK_Personnel_${month}.csv`);
    setTimeout(() => setExporting(null), 1000);
  }

  function exportDowntime() {
    setExporting("downtime");
    const rows = db.downtimeLogs
      .filter(d => monthKey((d.startTime || "").slice(0, 10)) === month)
      .map(d => ({
        "Machine": d.machineId,
        "Section": d.section,
        "Category": d.category,
        "Start Time": d.startTime,
        "Resolved": d.resolved ? "Yes" : "No",
        "Resolved At": d.resolvedAt || "",
        "Duration (hrs)": d.resolved ? ((new Date(d.resolvedAt) - new Date(d.startTime)) / 3600000).toFixed(2) : "Ongoing",
        "Response Time (min)": d.maintenanceResponseMins || "",
        "Supervisor Notified": d.supervisorNotified,
        "Description": d.description || "",
        "Logged By": d.loggedBy,
      }));
    if (!rows.length) { setExporting(null); return; }
    const headers = Object.keys(rows[0]);
    downloadCSV(buildCSV(rows, headers), `PRODTRACK_Downtime_${month}.csv`);
    setTimeout(() => setExporting(null), 1000);
  }

  function exportQC() {
    setExporting("qc");
    const rows = (db.qcLogs || [])
      .filter(q => monthKey(q.date) === month)
      .map(q => {
        const total = (QC_SECTIONS[q.section] || []).length;
        const passed = Object.values(q.checks || {}).filter(Boolean).length;
        return {
          "Date": q.date,
          "Shift": q.shiftId,
          "Section": q.section,
          "Machine": q.machineId,
          "Order ID": q.orderId,
          "Operator": q.operatorId,
          "Checks Passed": passed,
          "Total Checks": total,
          "All Passed": q.allPassed ? "Yes" : "No",
          "Remarks": q.remarks || "",
          "Approved By": q.approvedBy,
        };
      });
    if (!rows.length) { setExporting(null); return; }
    const headers = Object.keys(rows[0]);
    downloadCSV(buildCSV(rows, headers), `PRODTRACK_QC_${month}.csv`);
    setTimeout(() => setExporting(null), 1000);
  }

  function exportTraineeEvals() {
    setExporting("trainee");
    const EVAL_SKILLS = ["machine_handling","quality_awareness","speed_consistency","troubleshooting","documentation","safety_compliance"];
    const rows = (db.traineeEvals || [])
      .filter(e => monthKey(e.date) === month)
      .map(e => {
        const trainee = db.users.find(u => u.id === e.traineeId);
        const evaluator = db.users.find(u => u.id === e.evaluatorId);
        const scores = EVAL_SKILLS.map(s => e.scores?.[s] || 0);
        const avg = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1);
        return {
          "Date": e.date,
          "Trainee ID": e.traineeId,
          "Trainee Name": trainee?.name || "",
          "Evaluator": evaluator?.name || e.evaluatorId,
          "Machine Handling": e.scores?.machine_handling || 0,
          "Quality Awareness": e.scores?.quality_awareness || 0,
          "Speed & Consistency": e.scores?.speed_consistency || 0,
          "Troubleshooting": e.scores?.troubleshooting || 0,
          "Documentation": e.scores?.documentation || 0,
          "Safety Compliance": e.scores?.safety_compliance || 0,
          "Average Score": avg,
          "Recommendation": e.recommendation,
          "Notes": e.notes || "",
        };
      });
    if (!rows.length) { setExporting(null); return; }
    const headers = Object.keys(rows[0]);
    downloadCSV(buildCSV(rows, headers), `PRODTRACK_TraineeEvals_${month}.csv`);
    setTimeout(() => setExporting(null), 1000);
  }

  const exportBtns = [
    { id: "shifts",    label: "Shift Performance Log",    icon: "📋", desc: "All shift data with targets, actuals, and achievement % per section", fn: exportShiftLogs },
    { id: "personnel", label: "Personnel Performance",    icon: "👷", desc: "Per-person monthly output, targets, achievement, and bonus units", fn: exportPersonnelReport },
    { id: "downtime",  label: "Machine Downtime Report",  icon: "🔧", desc: "All downtime events with durations, categories, and response times", fn: exportDowntime },
    { id: "qc",        label: "QC Checklist Records",     icon: "✅", desc: "Pre-production QC logs with pass/fail status per machine and order", fn: exportQC },
    { id: "trainee",   label: "Trainee Evaluations",      icon: "📈", desc: "Skill scores and recommendations for all trainee evaluations", fn: exportTraineeEvals },
  ];

  return (
    <div>
      <PageTitle>Export Reports</PageTitle>
      <Row>
        <Col style={{ maxWidth: 220 }}>
          <Field label="Export Month">
            <select style={S.select} value={month} onChange={e => setMonth(e.target.value)}>
              {months.map(m => <option key={m}>{m}</option>)}
              {!months.length && <option value={today().slice(0, 7)}>{today().slice(0, 7)}</option>}
            </select>
          </Field>
        </Col>
      </Row>
      <Info>All reports export as CSV files which open directly in Microsoft Excel or Google Sheets. Select the month above and click any export button below.</Info>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 14, marginTop: 20 }}>
        {exportBtns.map(btn => (
          <div key={btn.id} style={{ ...S.card, display: "flex", flexDirection: "column", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontSize: 24 }}>{btn.icon}</span>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#eaf4fc" }}>{btn.label}</div>
            </div>
            <div style={{ fontSize: 11, color: "#5a7a8a", flex: 1 }}>{btn.desc}</div>
            <button
              style={{ ...S.btnPrimary, width: "100%", opacity: exporting === btn.id ? 0.6 : 1 }}
              onClick={btn.fn}
              disabled={!!exporting}
            >
              {exporting === btn.id ? "EXPORTING..." : `EXPORT ${month} CSV ↓`}
            </button>
          </div>
        ))}
      </div>

      <Card title="Data Retention Status" style={{ marginTop: 24 }}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(160px, 1fr))", gap: 12 }}>
          {[
            { label: "Shift Logs", count: db.shiftLogs.length },
            { label: "Downtime Events", count: db.downtimeLogs.length },
            { label: "QC Records", count: (db.qcLogs || []).length },
            { label: "Trainee Evals", count: (db.traineeEvals || []).length },
            { label: "Personnel", count: db.users.length },
          ].map(item => (
            <div key={item.label} style={{ background: "#07111e", border: "1px solid #1e3347", borderRadius: 8, padding: 12 }}>
              <div style={{ fontSize: 9, color: "#5a7a8a", marginBottom: 4 }}>{item.label.toUpperCase()}</div>
              <div style={{ fontSize: 20, fontWeight: 700, color: "#eaf4fc" }}>{item.count}</div>
              <div style={{ fontSize: 9, color: "#5a7a8a" }}>records stored</div>
            </div>
          ))}
        </div>
        <div style={{ fontSize: 10, color: "#5a7a8a", marginTop: 12 }}>Data is retained for 6 months. Shift logs older than 6 months are automatically removed on next save.</div>
      </Card>
    </div>
  );
}

function QCChecklistTab({ db, persist, currentUser }) {
  const blankQC = {
    date: today(),
    shiftId: "morning",
    section: "DB/WB",
    machineId: "",
    orderId: "",
    operatorId: "",
    checks: {},
    remarks: "",
    approvedBy: currentUser.id,
    status: "pending",
  };
  const [form, setForm] = useState(blankQC);
  const [flash, setFlash] = useState(null);

  const items = QC_SECTIONS[form.section] || [];
  const allChecked = items.length > 0 && items.every(i => form.checks[i.id] === true);
  const checkedCount = items.filter(i => form.checks[i.id] === true).length;

  const machineOptions = {
    "DB/WB": DIE_BONDERS.map(d => d.id),
    "Dispensing": ["DISP-1", "DISP-2"],
    "Sorting & Taping": ["TAPE-1", "TAPE-2", "TAPE-3", "TAPE-4"],
  };

  const prodUsers = db.users.filter(u => PROD_ROLES.includes(u.role) && u.active);

  function toggle(id) {
    setForm(f => ({ ...f, checks: { ...f.checks, [id]: !f.checks[id] } }));
  }

  function save() {
    if (!form.orderId || !form.machineId || !form.operatorId) {
      setFlash({ type: "error", msg: "Order ID, Machine, and Operator are required." });
      return;
    }
    const entry = {
      id: `QC-${Date.now()}`,
      ...form,
      allPassed: allChecked,
      savedAt: new Date().toISOString(),
      savedBy: currentUser.id,
    };
    persist({ ...db, qcLogs: [...(db.qcLogs || []), entry] });
    setFlash({ type: "success", msg: allChecked ? "✓ QC checklist completed — all checks passed. Production cleared." : "⚠ QC saved with incomplete checks. Production should NOT start until all items pass." });
    setForm(blankQC);
  }

  const recentQC = [...(db.qcLogs || [])].sort((a, b) => b.savedAt.localeCompare(a.savedAt)).slice(0, 8);

  return (
    <div>
      <PageTitle>Pre-Production QC Checklist</PageTitle>

      <Card title="New QC Inspection">
        {flash && <Flash type={flash.type}>{flash.msg}</Flash>}
        <Row>
          <Col><Field label="Date"><input style={S.input} type="date" value={form.date} onChange={e => setForm(f => ({ ...f, date: e.target.value }))} /></Field></Col>
          <Col><Field label="Shift"><select style={S.select} value={form.shiftId} onChange={e => setForm(f => ({ ...f, shiftId: e.target.value }))}>{SHIFTS.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}</select></Field></Col>
          <Col><Field label="Section"><select style={S.select} value={form.section} onChange={e => setForm(f => ({ ...f, section: e.target.value, checks: {}, machineId: "" }))}>{Object.keys(QC_SECTIONS).map(s => <option key={s}>{s}</option>)}</select></Field></Col>
        </Row>
        <Row>
          <Col><Field label="Machine / Line"><select style={S.select} value={form.machineId} onChange={e => setForm(f => ({ ...f, machineId: e.target.value }))}><option value="">Select...</option>{(machineOptions[form.section] || []).map(m => <option key={m}>{m}</option>)}</select></Field></Col>
          <Col><Field label="Production Order ID"><input style={S.input} value={form.orderId} onChange={e => setForm(f => ({ ...f, orderId: e.target.value.toUpperCase() }))} placeholder="e.g. WO-20260221-01" /></Field></Col>
          <Col><Field label="Operator / Trainee"><select style={S.select} value={form.operatorId} onChange={e => setForm(f => ({ ...f, operatorId: e.target.value }))}><option value="">Select...</option>{prodUsers.map(u => <option key={u.id} value={u.id}>{u.name} [{u.id}]</option>)}</select></Field></Col>
        </Row>

        <div style={{ ...S.infoBox, marginBottom: 16, display: "flex", alignItems: "center", gap: 16 }}>
          <div>
            <span style={{ color: "#5a7a8a", fontSize: 10 }}>PROGRESS</span>
            <span style={{ display: "block", fontSize: 18, fontWeight: 700, color: allChecked ? "#00e5a0" : checkedCount > 0 ? "#f5c518" : "#ff4d6d" }}>
              {checkedCount} / {items.length}
            </span>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ height: 6, background: "#1e3347", borderRadius: 3, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${items.length ? (checkedCount / items.length) * 100 : 0}%`, background: allChecked ? "#00e5a0" : "#f5c518", borderRadius: 3, transition: "width 0.3s" }} />
            </div>
          </div>
          {allChecked && <span style={{ fontSize: 20 }}>✅</span>}
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
          {items.map((item, idx) => {
            const checked = !!form.checks[item.id];
            return (
              <div
                key={item.id}
                onClick={() => toggle(item.id)}
                style={{
                  display: "flex", alignItems: "flex-start", gap: 12, padding: "10px 14px",
                  background: checked ? "#00e5a008" : "#07111e",
                  border: `1px solid ${checked ? "#00e5a033" : "#1e3347"}`,
                  borderRadius: 8, cursor: "pointer", transition: "all 0.15s",
                }}
              >
                <div style={{
                  width: 20, height: 20, borderRadius: 4, border: `2px solid ${checked ? "#00e5a0" : "#2a3a4a"}`,
                  background: checked ? "#00e5a0" : "transparent", display: "flex", alignItems: "center",
                  justifyContent: "center", flexShrink: 0, marginTop: 1, transition: "all 0.15s",
                }}>
                  {checked && <span style={{ color: "#07111e", fontSize: 12, fontWeight: 900 }}>✓</span>}
                </div>
                <div>
                  <span style={{ fontSize: 10, color: "#5a7a8a", marginRight: 6 }}>{String(idx + 1).padStart(2, "0")}</span>
                  <span style={{ fontSize: 12, color: checked ? "#eaf4fc" : "#c8dae8" }}>{item.text}</span>
                </div>
              </div>
            );
          })}
        </div>

        <Field label="Remarks / Observations">
          <textarea style={S.textarea} rows={2} value={form.remarks} onChange={e => setForm(f => ({ ...f, remarks: e.target.value }))} placeholder="Note any deviations, conditional passes, or observations..." />
        </Field>

        {!allChecked && checkedCount > 0 && (
          <Flash type="error">⚠ {items.length - checkedCount} item(s) unchecked. Production should not start until all checks pass.</Flash>
        )}

        <div style={{ textAlign: "right" }}>
          <button style={{ ...S.btnPrimary, background: allChecked ? "#00e5a0" : "#f5c518", color: "#07111e" }} onClick={save}>
            {allChecked ? "✓ APPROVE & CLEAR PRODUCTION →" : "SAVE PARTIAL CHECKLIST"}
          </button>
        </div>
      </Card>

      {recentQC.length > 0 && (
        <>
          <Subtitle>Recent QC Records</Subtitle>
          <div style={S.tableWrap}>
            <table style={S.tbl}>
              <thead><tr>{["Date","Shift","Section","Machine","Order ID","Operator","Checks","Status","Saved By"].map(h => <th key={h} style={S.th}>{h}</th>)}</tr></thead>
              <tbody>
                {recentQC.map(q => {
                  const total = (QC_SECTIONS[q.section] || []).length;
                  const passed = Object.values(q.checks || {}).filter(Boolean).length;
                  return (
                    <tr key={q.id}>
                      <td style={S.td}>{formatDate(q.date)}</td>
                      <td style={S.td}>{SHIFTS.find(s => s.id === q.shiftId)?.name || q.shiftId}</td>
                      <td style={S.td}>{q.section}</td>
                      <td style={S.td}>{q.machineId}</td>
                      <td style={S.td}>{q.orderId}</td>
                      <td style={S.td}>{q.operatorId}</td>
                      <td style={{ ...S.td, color: passed === total ? "#00e5a0" : "#f5c518", fontWeight: 700 }}>{passed}/{total}</td>
                      <td style={{ ...S.td, color: q.allPassed ? "#00e5a0" : "#ff4d6d", fontWeight: 700 }}>{q.allPassed ? "CLEARED" : "INCOMPLETE"}</td>
                      <td style={S.td}>{q.savedBy}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </>
      )}
    </div>
  );
}

function TraineeTrackerTab({ db, persist, currentUser, isExec }) {
  const trainees = db.users.filter(u => u.role === ROLES.TRAINEE && u.active);
  const seniorOps = db.users.filter(u => u.role === ROLES.SENIOR_OPERATOR && u.active);
  const [selectedTrainee, setSelectedTrainee] = useState(trainees[0]?.id || "");
  const [evalForm, setEvalForm] = useState(null);
  const [flash, setFlash] = useState(null);

  const trainee = db.users.find(u => u.id === selectedTrainee);
  const evals = (db.traineeEvals || []).filter(e => e.traineeId === selectedTrainee).sort((a, b) => a.date.localeCompare(b.date));

  // Monthly output data from shift logs for selected trainee
  const outputByMonth = {};
  db.shiftLogs.forEach(log => {
    const mk = monthKey(log.date);
    if (!(log.sections?.dbwb?.personnel || []).includes(selectedTrainee)) return;
    const shift = SHIFTS.find(s => s.id === log.shiftId) || SHIFTS[0];
    const effHrs = effectiveHours(shift.hours, log.orderChanges, log.materialWaitHours);
    const target = TRAINEE_DBWB_UPH * effHrs;
    const actual = ((log.sections.dbwb.dbActual || 0) + (log.sections.dbwb.wbActual || 0)) / 2 / ((log.sections.dbwb.personnel || []).length || 1);
    if (!outputByMonth[mk]) outputByMonth[mk] = { target: 0, actual: 0, shifts: 0 };
    outputByMonth[mk].target += target;
    outputByMonth[mk].actual += actual;
    outputByMonth[mk].shifts += 1;
  });
  const months = Object.keys(outputByMonth).sort();

  const EVAL_SKILLS = [
    { id: "machine_handling", label: "Machine Handling" },
    { id: "quality_awareness", label: "Quality Awareness" },
    { id: "speed_consistency", label: "Speed & Consistency" },
    { id: "troubleshooting", label: "Basic Troubleshooting" },
    { id: "documentation", label: "Documentation & Reporting" },
    { id: "safety_compliance", label: "Safety Compliance" },
  ];

  function openEval() {
    setEvalForm({
      traineeId: selectedTrainee,
      evaluatorId: currentUser.id,
      date: today(),
      scores: Object.fromEntries(EVAL_SKILLS.map(s => [s.id, 3])),
      notes: "",
      recommendation: "continue",
    });
  }

  function saveEval() {
    if (!evalForm) return;
    const entry = { id: `EVAL-${Date.now()}`, ...evalForm, savedAt: new Date().toISOString() };
    persist({ ...db, traineeEvals: [...(db.traineeEvals || []), entry] });
    setEvalForm(null);
    setFlash({ type: "success", msg: "✓ Evaluation saved." });
    setTimeout(() => setFlash(null), 2500);
  }

  // Mentor assignment
  function assignMentor(traineeId, mentorId) {
    const updated = db.users.map(u => u.id === traineeId ? { ...u, mentorId } : u);
    persist({ ...db, users: updated });
  }

  const latestEval = evals[evals.length - 1];
  const firstEval = evals[0];

  // Radar-style skill comparison: first vs latest eval
  function skillDelta(skillId) {
    if (!latestEval || !firstEval || latestEval === firstEval) return null;
    return (latestEval.scores?.[skillId] || 0) - (firstEval.scores?.[skillId] || 0);
  }

  return (
    <div>
      <PageTitle>Trainee Progression Tracker</PageTitle>

      {trainees.length === 0 && <Empty text="No active trainees found. Add trainees in Personnel." />}

      {trainees.length > 0 && (
        <>
          <Row>
            <Col style={{ maxWidth: 260 }}>
              <Field label="Select Trainee">
                <select style={S.select} value={selectedTrainee} onChange={e => setSelectedTrainee(e.target.value)}>
                  {trainees.map(t => <option key={t.id} value={t.id}>{t.name} [{t.id}]</option>)}
                </select>
              </Field>
            </Col>
            <Col style={{ maxWidth: 260 }}>
              <Field label="Assigned Mentor (Senior Operator)">
                <select style={S.select} value={trainee?.mentorId || ""} onChange={e => assignMentor(selectedTrainee, e.target.value)}>
                  <option value="">Unassigned</option>
                  {seniorOps.map(s => <option key={s.id} value={s.id}>{s.name} [{s.id}]</option>)}
                </select>
              </Field>
            </Col>
            <Col style={{ display: "flex", alignItems: "flex-end", paddingBottom: 12 }}>
              <button style={S.btnPrimary} onClick={openEval}>+ NEW EVALUATION</button>
            </Col>
          </Row>

          {flash && <Flash type={flash.type}>{flash.msg}</Flash>}

          {/* Evaluation Form Modal-style inline card */}
          {evalForm && (
            <Card title={`Evaluation — ${trainee?.name} [${selectedTrainee}]`}>
              <Row>
                <Col><Field label="Evaluation Date"><input style={S.input} type="date" value={evalForm.date} onChange={e => setEvalForm(f => ({ ...f, date: e.target.value }))} /></Field></Col>
                <Col>
                  <Field label="Evaluator">
                    <select style={S.select} value={evalForm.evaluatorId} onChange={e => setEvalForm(f => ({ ...f, evaluatorId: e.target.value }))}>
                      {[...seniorOps, ...db.users.filter(u => u.role === ROLES.SHIFT_INCHARGE)].map(u => (
                        <option key={u.id} value={u.id}>{u.name} [{u.id}]</option>
                      ))}
                    </select>
                  </Field>
                </Col>
                <Col>
                  <Field label="Recommendation">
                    <select style={S.select} value={evalForm.recommendation} onChange={e => setEvalForm(f => ({ ...f, recommendation: e.target.value }))}>
                      <option value="continue">Continue Training</option>
                      <option value="promote">Ready for Promotion to Operator</option>
                      <option value="reassign">Reassign to Different Section</option>
                      <option value="concern">Performance Concern — Review Needed</option>
                    </select>
                  </Field>
                </Col>
              </Row>

              <div style={S.subLabel}>Skill Scores (1 = Poor · 3 = Developing · 5 = Proficient)</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 10, marginBottom: 14 }}>
                {EVAL_SKILLS.map(skill => (
                  <div key={skill.id} style={{ background: "#07111e", border: "1px solid #1e3347", borderRadius: 8, padding: "10px 14px" }}>
                    <div style={{ fontSize: 10, color: "#5a7a8a", marginBottom: 8 }}>{skill.label}</div>
                    <div style={{ display: "flex", gap: 6 }}>
                      {[1, 2, 3, 4, 5].map(n => (
                        <button
                          key={n}
                          onClick={() => setEvalForm(f => ({ ...f, scores: { ...f.scores, [skill.id]: n } }))}
                          style={{
                            flex: 1, padding: "6px 0", borderRadius: 4, border: "1px solid",
                            borderColor: evalForm.scores[skill.id] === n ? "#00e5a0" : "#1e3347",
                            background: evalForm.scores[skill.id] === n ? "#00e5a020" : "#07111e",
                            color: evalForm.scores[skill.id] === n ? "#00e5a0" : "#5a7a8a",
                            fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: "inherit",
                          }}
                        >{n}</button>
                      ))}
                    </div>
                  </div>
                ))}
              </div>

              <Field label="Evaluator Notes">
                <textarea style={S.textarea} rows={2} value={evalForm.notes} onChange={e => setEvalForm(f => ({ ...f, notes: e.target.value }))} placeholder="Observations, strengths, areas for improvement..." />
              </Field>
              <Row>
                <Col><button style={{ ...S.btnPrimary, width: "100%" }} onClick={saveEval}>SAVE EVALUATION →</button></Col>
                <Col><button style={{ background: "none", border: "1px solid #1e3347", color: "#5a7a8a", borderRadius: 6, padding: "10px", width: "100%", cursor: "pointer", fontFamily: "inherit", fontSize: 11 }} onClick={() => setEvalForm(null)}>CANCEL</button></Col>
              </Row>
            </Card>
          )}

          {/* Output growth chart */}
          <div style={S.grid3}>
            <div style={{ ...S.card, gridColumn: "span 2" }}>
              <div style={S.cardTitle}>Monthly Output Trend — {trainee?.name}</div>
              {months.length === 0 && <Empty text="No shift data found for this trainee yet." />}
              {months.length > 0 && (
                <div>
                  <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 120, marginBottom: 8 }}>
                    {months.map(m => {
                      const d = outputByMonth[m];
                      const p = Math.min(100, d.target > 0 ? (d.actual / d.target) * 100 : 0);
                      const barH = Math.max(4, (p / 100) * 100);
                      return (
                        <div key={m} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                          <div style={{ fontSize: 9, color: statusColor(p), fontWeight: 700 }}>{Math.round(p)}%</div>
                          <div style={{ width: "100%", background: "#1e3347", borderRadius: "3px 3px 0 0", height: 100, display: "flex", alignItems: "flex-end" }}>
                            <div style={{ width: "100%", height: `${barH}%`, background: statusColor(p), borderRadius: "3px 3px 0 0", transition: "height 0.4s" }} />
                          </div>
                          <div style={{ fontSize: 8, color: "#5a7a8a", textAlign: "center" }}>{m.slice(5)}</div>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ display: "flex", gap: 16, fontSize: 10, color: "#5a7a8a" }}>
                    <span>🟢 ≥100% target &nbsp; 🟡 85–99% &nbsp; 🔴 &lt;85%</span>
                    <span style={{ marginLeft: "auto" }}>Total shifts: {Object.values(outputByMonth).reduce((s, d) => s + d.shifts, 0)}</span>
                  </div>
                </div>
              )}
            </div>

            <div style={S.card}>
              <div style={S.cardTitle}>Current Status</div>
              <div style={{ fontSize: 11, color: "#5a7a8a", marginBottom: 6 }}>Mentor</div>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#eaf4fc", marginBottom: 14 }}>
                {trainee?.mentorId ? (db.users.find(u => u.id === trainee.mentorId)?.name || trainee.mentorId) : "Unassigned"}
              </div>
              <div style={{ fontSize: 11, color: "#5a7a8a", marginBottom: 6 }}>Evaluations</div>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#eaf4fc", marginBottom: 14 }}>{evals.length}</div>
              {latestEval && (
                <>
                  <div style={{ fontSize: 11, color: "#5a7a8a", marginBottom: 6 }}>Latest Recommendation</div>
                  <div style={{ fontSize: 12, fontWeight: 700, color: latestEval.recommendation === "promote" ? "#00e5a0" : latestEval.recommendation === "concern" ? "#ff4d6d" : "#f5c518", marginBottom: 14 }}>
                    {latestEval.recommendation === "promote" ? "✓ READY FOR PROMOTION" : latestEval.recommendation === "concern" ? "⚠ PERFORMANCE CONCERN" : latestEval.recommendation === "reassign" ? "↔ REASSIGN" : "→ CONTINUE TRAINING"}
                  </div>
                </>
              )}
            </div>
          </div>

          {/* Skill progression table */}
          {evals.length > 0 && (
            <>
              <Subtitle>Skill Evaluation History</Subtitle>
              <div style={S.tableWrap}>
                <table style={S.tbl}>
                  <thead>
                    <tr>
                      <th style={S.th}>Date</th>
                      <th style={S.th}>Evaluator</th>
                      {EVAL_SKILLS.map(s => <th key={s.id} style={S.th}>{s.label}</th>)}
                      <th style={S.th}>Avg</th>
                      <th style={S.th}>Recommendation</th>
                    </tr>
                  </thead>
                  <tbody>
                    {evals.map(ev => {
                      const scores = EVAL_SKILLS.map(s => ev.scores?.[s.id] || 0);
                      const avg = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1);
                      const avgCol = Number(avg) >= 4 ? "#00e5a0" : Number(avg) >= 3 ? "#f5c518" : "#ff4d6d";
                      const rec = { continue: "Training", promote: "🟢 Promote", reassign: "↔ Reassign", concern: "🔴 Concern" };
                      return (
                        <tr key={ev.id}>
                          <td style={S.td}>{formatDate(ev.date)}</td>
                          <td style={S.td}>{ev.evaluatorId}</td>
                          {EVAL_SKILLS.map(s => {
                            const score = ev.scores?.[s.id] || 0;
                            const delta = skillDelta(s.id);
                            const isLatest = ev === latestEval;
                            return (
                              <td key={s.id} style={{ ...S.td, color: score >= 4 ? "#00e5a0" : score >= 3 ? "#f5c518" : "#ff4d6d", fontWeight: 700 }}>
                                {score}
                                {isLatest && delta !== null && delta !== 0 && (
                                  <span style={{ fontSize: 9, marginLeft: 3, color: delta > 0 ? "#00e5a0" : "#ff4d6d" }}>
                                    {delta > 0 ? `↑+${delta}` : `↓${delta}`}
                                  </span>
                                )}
                              </td>
                            );
                          })}
                          <td style={{ ...S.td, color: avgCol, fontWeight: 700 }}>{avg}</td>
                          <td style={S.td}>{rec[ev.recommendation] || ev.recommendation}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </>
          )}

          {/* Senior Operator mentoring impact */}
          {seniorOps.length > 0 && (
            <>
              <Subtitle>Senior Operator Mentoring Impact</Subtitle>
              <div style={S.grid3}>
                {seniorOps.map(so => {
                  const mentees = db.users.filter(u => u.role === ROLES.TRAINEE && u.mentorId === so.id);
                  const menteeAvgScores = mentees.map(t => {
                    const tevs = (db.traineeEvals || []).filter(e => e.traineeId === t.id);
                    if (!tevs.length) return null;
                    const latest = tevs[tevs.length - 1];
                    const scores = EVAL_SKILLS.map(s => latest.scores?.[s.id] || 0);
                    return scores.reduce((a, b) => a + b, 0) / scores.length;
                  }).filter(Boolean);
                  const avgScore = menteeAvgScores.length ? (menteeAvgScores.reduce((a, b) => a + b, 0) / menteeAvgScores.length).toFixed(1) : null;

                  return (
                    <div key={so.id} style={S.card}>
                      <div style={{ fontWeight: 700, color: "#eaf4fc", marginBottom: 8 }}>{so.name}</div>
                      <div style={S.dtRow}>Mentees assigned: <b style={{ color: "#00e5a0" }}>{mentees.length}</b></div>
                      {mentees.map(t => <div key={t.id} style={{ ...S.dtRow, color: "#5a7a8a" }}>→ {t.name} [{t.id}]</div>)}
                      {avgScore && (
                        <div style={{ marginTop: 10 }}>
                          <div style={{ fontSize: 10, color: "#5a7a8a", marginBottom: 2 }}>Avg trainee skill score</div>
                          <div style={{ fontSize: 18, fontWeight: 700, color: Number(avgScore) >= 4 ? "#00e5a0" : Number(avgScore) >= 3 ? "#f5c518" : "#ff4d6d" }}>{avgScore} / 5</div>
                        </div>
                      )}
                      {!avgScore && <div style={{ ...S.dtRow, color: "#5a7a8a", marginTop: 8 }}>No evaluations yet</div>}
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </>
      )}
    </div>
  );
}

// VOICE NOTE COMPONENT
// ============================================================
function VoiceNote({ voiceNote, onSave, onClear }) {
  const [state, setState] = useState("idle"); // idle | recording | recorded | playing
  const [duration, setDuration] = useState(0);
  const [elapsed, setElapsed] = useState(0);
  const mediaRef = useRef(null);
  const streamRef = useRef(null);
  const chunksRef = useRef([]);
  const timerRef = useRef(null);
  const audioRef = useRef(null);

  // If a saved blob URL exists from parent, show "recorded" state on mount
  const [localUrl, setLocalUrl] = useState(null);

  useEffect(() => {
    if (voiceNote && !localUrl) {
      const url = URL.createObjectURL(voiceNote);
      setLocalUrl(url);
      setState("recorded");
    }
    if (!voiceNote && state !== "idle" && state !== "recording") {
      setState("idle");
      setLocalUrl(null);
      setDuration(0);
      setElapsed(0);
    }
  }, [voiceNote]);

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      streamRef.current = stream;
      chunksRef.current = [];
      const mr = new MediaRecorder(stream);
      mediaRef.current = mr;
      mr.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
      mr.onstop = () => {
        const blob = new Blob(chunksRef.current, { type: "audio/webm" });
        const url = URL.createObjectURL(blob);
        setLocalUrl(url);
        onSave(blob);
        setState("recorded");
        clearInterval(timerRef.current);
      };
      mr.start();
      setState("recording");
      setElapsed(0);
      timerRef.current = setInterval(() => setElapsed(e => e + 1), 1000);
    } catch (err) {
      alert("Microphone access denied. Please allow microphone permission in your browser.");
    }
  }

  function stopRecording() {
    if (mediaRef.current && mediaRef.current.state !== "inactive") mediaRef.current.stop();
    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    clearInterval(timerRef.current);
    setDuration(elapsed);
  }

  function playPause() {
    if (!audioRef.current) return;
    if (state === "playing") {
      audioRef.current.pause();
      setState("recorded");
    } else {
      audioRef.current.play();
      setState("playing");
    }
  }

  function clear() {
    if (audioRef.current) { audioRef.current.pause(); audioRef.current.currentTime = 0; }
    setLocalUrl(null);
    setState("idle");
    setDuration(0);
    setElapsed(0);
    onClear();
  }

  function fmt(s) { return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`; }

  return (
    <div style={vS.wrap}>
      <div style={vS.label}>🎙 Voice Note <span style={{ color: "#5a7a8a", fontWeight: 400 }}>(record in any language)</span></div>

      {state === "idle" && (
        <button style={vS.recBtn} onClick={startRecording}>
          <span style={vS.dot} />
          START RECORDING
        </button>
      )}

      {state === "recording" && (
        <div style={vS.recActive}>
          <div style={vS.recPulse}>
            <span style={vS.dotRed} />
            RECORDING... {fmt(elapsed)}
          </div>
          <button style={vS.stopBtn} onClick={stopRecording}>⏹ STOP</button>
        </div>
      )}

      {(state === "recorded" || state === "playing") && localUrl && (
        <div style={vS.player}>
          <audio ref={audioRef} src={localUrl} onEnded={() => setState("recorded")} />
          <button style={vS.playBtn} onClick={playPause}>
            {state === "playing" ? "⏸ PAUSE" : "▶ PLAY"}
          </button>
          <div style={vS.playerInfo}>
            Voice note recorded {duration ? `(${fmt(duration)})` : ""}
          </div>
          <button style={vS.clearBtn} onClick={clear}>✕ REMOVE</button>
        </div>
      )}
    </div>
  );
}

// Simple playback-only component for saved logs
function VoiceNotePlayer({ src }) {
  const [playing, setPlaying] = useState(false);
  const ref = useRef(null);
  function toggle() {
    if (!ref.current) return;
    if (playing) { ref.current.pause(); setPlaying(false); }
    else { ref.current.play(); setPlaying(true); }
  }
  return (
    <div style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 8 }}>
      <audio ref={ref} src={src} onEnded={() => setPlaying(false)} />
      <button onClick={toggle} style={{ ...vS.playBtn, padding: "4px 12px", fontSize: 10 }}>
        {playing ? "⏸ PAUSE NOTE" : "🎙 PLAY VOICE NOTE"}
      </button>
    </div>
  );
}

function SubHeading({ children }) { return <div style={{ fontSize: 10, fontWeight: 700, color: "#00e5a0", letterSpacing: 2, margin: "16px 0 8px", textTransform: "uppercase" }}>{children}</div>; }
function Subtitle({ children }) { return <div style={{ fontSize: 11, fontWeight: 600, color: "#00e5a0", letterSpacing: 2, margin: "24px 0 10px", textTransform: "uppercase" }}>{children}</div>; }
function Card({ title, children }) {
  return (
    <div style={S.card}>
      {title && <div style={S.cardTitle}>{title}</div>}
      {children}
    </div>
  );
}
function Field({ label, children, style }) { return <div style={{ marginBottom: 12, ...style }}><label style={S.lbl}>{label}</label>{children}</div>; }
function Row({ children }) { return <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 4 }}>{children}</div>; }
function Col({ children, style }) { return <div style={{ flex: 1, minWidth: 140, ...style }}>{children}</div>; }
function Info({ children }) { return <div style={S.infoBox}>{children}</div>; }
function Empty({ text }) { return <div style={{ color: "#5a7a8a", textAlign: "center", padding: "48px 0", fontSize: 13 }}>{text}</div>; }
function Flash({ type, children }) {
  const ok = type === "success";
  return <div style={{ background: ok ? "#00e5a015" : "#ff4d6d15", border: `1px solid ${ok ? "#00e5a044" : "#ff4d6d44"}`, borderRadius: 6, padding: "10px 14px", marginBottom: 12, fontSize: 12, color: ok ? "#00e5a0" : "#ff4d6d" }}>{children}</div>;
}
function StatBox({ label, value, col }) {
  return (
    <div style={S.statBox}>
      <div style={S.meta}>{label}</div>
      <div style={{ fontSize: 22, fontWeight: 700, color: col || "#eaf4fc", marginTop: 4 }}>{value}</div>
    </div>
  );
}

  hdrL: { display: "flex", alignItems: "center", gap: 12 },

  hdrR: { display: "flex", alignItems: "center", gap: 10 },
  hdrUser: { fontSize: 11, color: C.muted },
  alarmBtn: { background: "#ff4d6d22", border: "1px solid #ff4d6d", color: "#ff4d6d", padding: "4px 12px", borderRadius: 6, fontSize: 10, cursor: "pointer", fontFamily: "inherit", fontWeight: 700, animation: "pulse 1.5s infinite" },
  nav: { background: C.surf2, borderBottom: `1px solid ${C.bdr}`, padding: "0 24px", display: "flex", gap: 2, overflowX: "auto" },
  navBtn: { background: "none", border: "none", color: C.muted, padding: "12px 16px", fontSize: 10, fontWeight: 700, letterSpacing: 1.5, cursor: "pointer", borderBottom: "2px solid transparent", fontFamily: "inherit", whiteSpace: "nowrap", transition: "color 0.15s" },
  navActive: { color: C.acc, borderBottomColor: C.acc },
  main: { padding: 24, maxWidth: 1440, margin: "0 auto", width: "100%" },
  card: { background: C.surf, border: `1px solid ${C.bdr}`, borderRadius: 10, padding: 20, marginBottom: 16 },
  cardHead: { display: "flex", alignItems: "center", gap: 8, marginBottom: 12, flexWrap: "wrap" },
  cardDate: { fontSize: 13, fontWeight: 700, color: C.bright, flex: 1 },
  cardTitle: { fontSize: 11, fontWeight: 700, color: C.acc, letterSpacing: 2, marginBottom: 16, textTransform: "uppercase" },
  cardFoot: { display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap", marginTop: 8 },
  badge: { fontSize: 9, padding: "2px 8px", borderRadius: 12, color: C.muted },
  tag: { fontSize: 9, padding: "1px 6px", borderRadius: 8, fontWeight: 700 },
  metrics: { display: "flex", gap: 8, marginBottom: 8 },
  meter: { flex: 1 },
  meterLabel: { fontSize: 8, color: C.muted, letterSpacing: 1, marginBottom: 2 },
  meterTrack: { height: 3, background: C.bdr, borderRadius: 2, overflow: "hidden", marginBottom: 2 },
  meterFill: { height: "100%", borderRadius: 2 },
  meterPct: { fontSize: 10, fontWeight: 700 },
  meta: { fontSize: 10, color: C.muted },
  note: { fontSize: 11, color: C.muted, marginTop: 8, fontStyle: "italic", borderLeft: `2px solid ${C.bdr}`, paddingLeft: 8 },
  alarmBanner: { background: "#ff4d6d22", border: "1px solid #ff4d6d44", borderRadius: 6, padding: "6px 10px", marginBottom: 10, fontSize: 11, color: "#ff4d6d", fontWeight: 700 },
  dtRow: { fontSize: 12, marginBottom: 4 },
  grid3: { display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 14, marginBottom: 20 },
  grid4: { display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(160px, 1fr))", gap: 12, marginBottom: 20 },
  statBox: { background: C.surf, border: `1px solid ${C.bdr}`, borderRadius: 10, padding: 16 },
  lbl: { display: "block", fontSize: 9, color: C.muted, letterSpacing: 1.5, marginBottom: 5, textTransform: "uppercase", fontWeight: 700 },
  input: { width: "100%", background: C.bg, border: `1px solid ${C.bdr}`, borderRadius: 6, padding: "8px 12px", color: C.bright, fontSize: 12, fontFamily: "inherit", outline: "none", boxSizing: "border-box" },
  select: { width: "100%", background: C.bg, border: `1px solid ${C.bdr}`, borderRadius: 6, padding: "8px 12px", color: C.bright, fontSize: 12, fontFamily: "inherit", outline: "none", boxSizing: "border-box" },
  textarea: { width: "100%", background: C.bg, border: `1px solid ${C.bdr}`, borderRadius: 6, padding: "8px 12px", color: C.bright, fontSize: 12, fontFamily: "inherit", outline: "none", resize: "vertical", boxSizing: "border-box" },
  chips: { display: "flex", flexWrap: "wrap", gap: 7, marginBottom: 12 },
  chip: { background: C.bg, border: `1px solid ${C.bdr}`, borderRadius: 6, padding: "6px 12px", color: C.muted, fontSize: 11, cursor: "pointer", fontFamily: "inherit", textAlign: "center", transition: "all 0.12s", lineHeight: 1.4 },
  chipOn: { background: "#00e5a015", borderColor: "#00e5a0", color: "#00e5a0" },
  infoBox: { background: "#00e5a008", border: "1px solid #00e5a020", borderRadius: 6, padding: "8px 12px", fontSize: 11, color: C.txt, marginTop: 8, display: "block" },
  subLabel: { fontSize: 10, color: C.muted, letterSpacing: 1, marginBottom: 8 },
  errMsg: { color: "#ff4d6d", fontSize: 12, marginTop: 6 },
  btnPrimary: { background: C.acc, color: "#07111e", border: "none", borderRadius: 6, padding: "10px 22px", fontSize: 11, fontWeight: 700, letterSpacing: 2, cursor: "pointer", fontFamily: "inherit" },
  btnLogout: { background: "none", border: `1px solid ${C.bdr}`, color: C.muted, borderRadius: 6, padding: "5px 12px", fontSize: 10, cursor: "pointer", fontFamily: "inherit" },
  tableWrap: { overflowX: "auto", marginBottom: 24 },
  tbl: { width: "100%", borderCollapse: "collapse", fontSize: 11 },
  th: { background: C.surf2, color: C.muted, padding: "7px 12px", textAlign: "left", fontSize: 9, letterSpacing: 1.5, fontWeight: 700, textTransform: "uppercase", borderBottom: `1px solid ${C.bdr}`, whiteSpace: "nowrap" },

const CSS = `
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  input:focus, select:focus, textarea:focus { border-color: #00e5a0 !important; }
  tr:hover td { background: #0d1f2f !important; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: #07111e; }
  ::-webkit-scrollbar-thumb { background: #1e3347; border-radius: 3px; }
  button:hover { opacity: 0.82; }
`;

const root = ReactDOM.createRoot(document.getElementById("root"));

// ============================================================
// PRODUCTION ORDERS TAB
// ============================================================
function ProductionOrdersTab({ db, persist_order, currentUser, canOrder }) {
  const { useState } = React;
  const blank = {
    orderRef:"", customer:"", ledType:"", waferSize:"", spConfig:"S",
    waferQty:"", targetQty:"", dueDate:"", priority:"Normal",
    customerBins:[], targetYieldPct:"90", vfMin:"", vfMax:"",
    ivMin:"", ivMax:"", cct:"", notes:""
  };
  const [form, setForm] = useState(blank);
  const [binInput, setBinInput] = useState("");
  const [flash, setFlash] = useState(null);
  const [saving, setSaving] = useState(false);
  const [filter, setFilter] = useState("All");
  const [expandId, setExpandId] = useState(null);
  const [editOrder, setEditOrder] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [confirmCancel, setConfirmCancel] = useState(null);

  function fld(k,v){ setForm(f=>({...f,[k]:v})); }

  function addBin() {
    const b = binInput.trim();
    if (!b || form.customerBins.includes(b)) return;
    setForm(f=>({...f,customerBins:[...f.customerBins,b]}));
    setBinInput("");
  }
  function removeBin(b){ setForm(f=>({...f,customerBins:f.customerBins.filter(x=>x!==b)})); }

  function startEdit(o) {
    setForm({
      orderRef:o.orderRef, customer:o.customer, ledType:o.ledType||"",
      waferSize:o.waferSize||"", spConfig:o.spConfig||"S",
      waferQty:o.waferQty||"", targetQty:o.targetQty||"",
      dueDate:o.dueDate||"", priority:o.priority||"Normal",
      customerBins:o.customerBins||[], targetYieldPct:o.targetYieldPct||"90",
      vfMin:o.vfMin||"", vfMax:o.vfMax||"",
      ivMin:o.ivMin||"", ivMax:o.ivMax||"", cct:o.cct||"", notes:o.notes||""
    });
    setEditOrder(o);
    window.scrollTo({top:0,behavior:"smooth"});
  }

  function cancelEdit() { setEditOrder(null); setForm(blank); setBinInput(""); }

  async function save() {
    if (!form.orderRef||!form.customer||!form.ledType||!form.targetQty||!form.dueDate){
      setFlash({t:"error",m:"Order Ref, Customer, LED Type, Quantity and Due Date are required."}); return;
    }
    if (!editOrder && db.productionOrders.find(o=>o.orderRef===form.orderRef)){
      setFlash({t:"error",m:"Order reference already exists."}); return;
    }
    setSaving(true);
    const order = editOrder
      ? {...editOrder, ...form}
      : {...form, id:"ORD-"+Date.now(), status:ORDER_STATUS.PENDING,
         assignedMachines:[], assignedBy:null, assignedAt:null,
         createdBy:currentUser.id, createdAt:new Date().toISOString()};
    try {
      await persist_order(order);
      setForm(blank); setBinInput(""); setEditOrder(null);
      setFlash({t:"success",m:editOrder?"✓ Order updated.":"✓ Production order created."}); 
      setTimeout(()=>setFlash(null),3000);
    } catch(e){ setFlash({t:"error",m:"Save failed: "+e.message}); }
    setSaving(false);
  }

  async function updateStatus(order, status) {
    try { await persist_order({...order, status}); }
    catch(e){ setFlash({t:"error",m:"Failed: "+e.message}); }
  }

  async function deleteOrder(o) {
    try {
      await sbDelete("production_orders", o.id);
      setConfirmDel(null);
      setFlash({t:"success",m:"✓ Order deleted."}); setTimeout(()=>setFlash(null),3000);
    } catch(e){ setFlash({t:"error",m:"Delete failed: "+e.message}); setConfirmDel(null); }
  }

  const statusColor = s => s===ORDER_STATUS.COMPLETED?"#00e5a0":s===ORDER_STATUS.IN_PROGRESS?"#f5c518":s===ORDER_STATUS.ON_HOLD?"#ff9900":s==="Cancelled"?"#888888":"#5a7a8a";
  const priColor = p => p==="High"?"#ff4d6d":p==="Low"?"#5a7a8a":"#f5c518";
  const filtered = filter==="All"?db.productionOrders:db.productionOrders.filter(o=>o.status===filter);

  return (
    <div>
      <PageTitle>📋 Production Orders</PageTitle>
      {flash && <Flash type={flash.t}>{flash.m}</Flash>}

      {/* Delete confirmation */}
      {confirmDel && (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#000000bb",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
          <div style={{background:"#0d1f2f",border:"1px solid #ff4d6d",borderRadius:12,padding:32,maxWidth:380,width:"90%",textAlign:"center"}}>
            <div style={{fontSize:24,marginBottom:12}}>🗑</div>
            <div style={{fontSize:14,fontWeight:700,color:"#eaf4fc",marginBottom:8}}>Delete Order?</div>
            <div style={{fontSize:12,color:"#5a7a8a",marginBottom:24}}><b style={{color:"#ff4d6d"}}>{confirmDel.orderRef}</b> will be permanently deleted. This cannot be undone.</div>
            <div style={{display:"flex",gap:12,justifyContent:"center"}}>
              <button style={{background:"#ff4d6d",color:"#fff",border:"none",borderRadius:6,padding:"10px 24px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>deleteOrder(confirmDel)}>YES, DELETE</button>
              <button style={{background:"none",border:"1px solid #1e3347",color:"#5a7a8a",borderRadius:6,padding:"10px 24px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setConfirmDel(null)}>CANCEL</button>
            </div>
          </div>
        </div>
      )}

      {/* Cancel confirmation */}
      {confirmCancel && (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#000000bb",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
          <div style={{background:"#0d1f2f",border:"1px solid #ff9900",borderRadius:12,padding:32,maxWidth:380,width:"90%",textAlign:"center"}}>
            <div style={{fontSize:24,marginBottom:12}}>⚠</div>
            <div style={{fontSize:14,fontWeight:700,color:"#eaf4fc",marginBottom:8}}>Cancel Order?</div>
            <div style={{fontSize:12,color:"#5a7a8a",marginBottom:24}}><b style={{color:"#ff9900"}}>{confirmCancel.orderRef}</b> will be marked as Cancelled. You can delete it later if needed.</div>
            <div style={{display:"flex",gap:12,justifyContent:"center"}}>
              <button style={{background:"#ff9900",color:"#07111e",border:"none",borderRadius:6,padding:"10px 24px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>{updateStatus(confirmCancel,"Cancelled");setConfirmCancel(null);}}>YES, CANCEL ORDER</button>
              <button style={{background:"none",border:"1px solid #1e3347",color:"#5a7a8a",borderRadius:6,padding:"10px 24px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setConfirmCancel(null)}>GO BACK</button>
            </div>
          </div>
        </div>
      )}

      {canOrder && (
        <Card title={editOrder?"Edit Order: "+editOrder.orderRef:"Create New Production Order"}>
          <SubHeading>Order Details</SubHeading>
          <Row>
            <Col><Field label="Order Reference *"><input style={S.input} value={form.orderRef} onChange={e=>fld("orderRef",e.target.value.toUpperCase())} placeholder="e.g. PO-2025-001" disabled={!!editOrder} /></Field></Col>
            <Col><Field label="Customer *"><input style={S.input} value={form.customer} onChange={e=>fld("customer",e.target.value)} placeholder="Customer name" /></Field></Col>
            <Col><Field label="Priority"><select style={S.select} value={form.priority} onChange={e=>fld("priority",e.target.value)}>{Object.values(PRIORITY).map(p=><option key={p}>{p}</option>)}</select></Field></Col>
            <Col><Field label="Due Date *"><input style={S.input} type="date" value={form.dueDate} onChange={e=>fld("dueDate",e.target.value)} /></Field></Col>
          </Row>
          <SubHeading>Product Specification</SubHeading>
          <Row>
            <Col><Field label="LED Type / Part No. *"><input style={S.input} value={form.ledType} onChange={e=>fld("ledType",e.target.value)} placeholder="e.g. 2835-WW" /></Field></Col>
            <Col><Field label="Wafer / Die Size"><input style={S.input} value={form.waferSize} onChange={e=>fld("waferSize",e.target.value)} placeholder="e.g. 6 inch" /></Field></Col>
            <Col><Field label="S/P Config"><select style={S.select} value={form.spConfig} onChange={e=>fld("spConfig",e.target.value)}><option>S</option><option>P</option><option>S+P</option></select></Field></Col>
            <Col><Field label="No. of Wafers"><input style={S.input} type="number" value={form.waferQty} onChange={e=>fld("waferQty",e.target.value)} placeholder="0" /></Field></Col>
          </Row>
          <Row>
            <Col><Field label="Target Quantity (units) *"><input style={S.input} type="number" value={form.targetQty} onChange={e=>fld("targetQty",e.target.value)} placeholder="0" /></Field></Col>
            <Col><Field label="Vf Min (V)"><input style={S.input} type="number" step="0.01" value={form.vfMin} onChange={e=>fld("vfMin",e.target.value)} placeholder="e.g. 2.8" /></Field></Col>
            <Col><Field label="Vf Max (V)"><input style={S.input} type="number" step="0.01" value={form.vfMax} onChange={e=>fld("vfMax",e.target.value)} placeholder="e.g. 3.6" /></Field></Col>
            <Col><Field label="Iv Min (mcd)"><input style={S.input} type="number" value={form.ivMin} onChange={e=>fld("ivMin",e.target.value)} placeholder="e.g. 100" /></Field></Col>
            <Col><Field label="Iv Max (mcd)"><input style={S.input} type="number" value={form.ivMax} onChange={e=>fld("ivMax",e.target.value)} placeholder="e.g. 400" /></Field></Col>
            <Col><Field label="CCT (K) — optional"><input style={S.input} value={form.cct} onChange={e=>fld("cct",e.target.value)} placeholder="e.g. 4000K" /></Field></Col>
          </Row>
          <SubHeading>Customer BIN Requirements</SubHeading>
          <div style={{fontSize:11,color:"#5a7a8a",marginBottom:8}}>Enter acceptable BIN labels for this customer (these will map to physical BIN numbers on the sorting machine)</div>
          <Row>
            <Col style={{maxWidth:320}}><Field label="Add BIN Label"><div style={{display:"flex",gap:8}}><input style={{...S.input,flex:1}} value={binInput} onChange={e=>setBinInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addBin()} placeholder="e.g. BIN 3, Cool White, 4000K..." /><button style={{...S.btnPrimary,padding:"8px 14px",whiteSpace:"nowrap"}} onClick={addBin}>+ Add</button></div></Field></Col>
            <Col style={{maxWidth:200}}><Field label="Target Yield % for Customer BINs"><input style={S.input} type="number" value={form.targetYieldPct} onChange={e=>fld("targetYieldPct",e.target.value)} placeholder="90" /></Field></Col>
          </Row>
          {form.customerBins.length>0 && (
            <div style={S.chips}>
              {form.customerBins.map(b=>(
                <div key={b} style={{...S.chip,...S.chipOn,display:"flex",alignItems:"center",gap:6}}>
                  {b} <span style={{cursor:"pointer",color:"#ff4d6d"}} onClick={()=>removeBin(b)}>✕</span>
                </div>
              ))}
            </div>
          )}
          <Field label="Notes"><textarea style={S.ta} rows={2} value={form.notes} onChange={e=>fld("notes",e.target.value)} placeholder="Any additional instructions..." /></Field>
          <div style={{textAlign:"right",marginTop:8,display:"flex",gap:10,justifyContent:"flex-end"}}>
            {editOrder && <button style={{background:"none",border:"1px solid #1e3347",color:"#5a7a8a",borderRadius:6,padding:"10px 20px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}} onClick={cancelEdit}>CANCEL EDIT</button>}
            <button style={S.btnPrimary} onClick={save} disabled={saving}>{saving?"SAVING...":editOrder?"UPDATE ORDER →":"CREATE ORDER →"}</button>
          </div>
        </Card>
      )}

      <Card title="Orders">
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          {["All",...Object.values(ORDER_STATUS),"Cancelled"].map(s=>(
            <button key={s} style={{...S.chip,...(filter===s?S.chipOn:{})}} onClick={()=>setFilter(s)}>{s}</button>
          ))}
        </div>
        {filtered.length===0?<Empty text="No orders found." />:(
          <div style={S.tableWrap}>
            <table style={S.tbl}>
              <thead><tr>{["Order Ref","Customer","LED Type","Qty","Due Date","Priority","Status","Actions"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
              <tbody>
                {filtered.map(o=>{
                  const overdue = o.status!==ORDER_STATUS.COMPLETED && o.status!=="Cancelled" && new Date(o.dueDate)<new Date();
                  return (
                    <React.Fragment key={o.id}>
                      <tr style={{cursor:"pointer"}} onClick={()=>setExpandId(expandId===o.id?null:o.id)}>
                        <td style={{...S.td,color:"#00e5a0",fontWeight:700}}>{o.orderRef}</td>
                        <td style={S.td}>{o.customer}</td>
                        <td style={S.td}>{o.ledType}</td>
                        <td style={{...S.td,textAlign:"right"}}>{Number(o.targetQty).toLocaleString()}</td>
                        <td style={{...S.td,color:overdue?"#ff4d6d":"#c8dae8"}}>{o.dueDate}{overdue?" ⚠":""}</td>
                        <td style={{...S.td,color:priColor(o.priority),fontWeight:700}}>{o.priority}</td>
                        <td style={S.td}><span style={{background:statusColor(o.status)+"22",border:"1px solid "+statusColor(o.status)+"66",color:statusColor(o.status),borderRadius:4,padding:"2px 8px",fontSize:10,fontWeight:700}}>{o.status}</span></td>
                        <td style={S.td} onClick={e=>e.stopPropagation()}>
                          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                            {o.status===ORDER_STATUS.PENDING && canOrder && <button style={{...S.chipOn,...S.chip,fontSize:9,padding:"3px 8px"}} onClick={()=>updateStatus(o,ORDER_STATUS.IN_PROGRESS)}>▶ Start</button>}
                            {o.status===ORDER_STATUS.IN_PROGRESS && canOrder && <button style={{background:"#00e5a015",border:"1px solid #00e5a044",color:"#00e5a0",borderRadius:4,padding:"3px 8px",fontSize:9,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>updateStatus(o,ORDER_STATUS.COMPLETED)}>✓ Complete</button>}
                            {o.status===ORDER_STATUS.IN_PROGRESS && canOrder && <button style={{background:"#1e3347",border:"1px solid #2a4a5e",color:"#c8dae8",borderRadius:4,padding:"3px 8px",fontSize:9,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>updateStatus(o,ORDER_STATUS.ON_HOLD)}>⏸ Hold</button>}
                            {o.status===ORDER_STATUS.ON_HOLD && canOrder && <button style={{background:"#1e3347",border:"1px solid #2a4a5e",color:"#c8dae8",borderRadius:4,padding:"3px 8px",fontSize:9,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>updateStatus(o,ORDER_STATUS.IN_PROGRESS)}>▶ Resume</button>}
                            {o.status!==ORDER_STATUS.COMPLETED && o.status!=="Cancelled" && canOrder && <button style={{background:"#ff990015",border:"1px solid #ff990044",color:"#ff9900",borderRadius:4,padding:"3px 8px",fontSize:9,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setConfirmCancel(o)}>✕ Cancel</button>}
                            {canOrder && o.status!==ORDER_STATUS.COMPLETED && <button style={{background:"#5a7a8a15",border:"1px solid #5a7a8a44",color:"#5a7a8a",borderRadius:4,padding:"3px 8px",fontSize:9,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>startEdit(o)}>✏ Edit</button>}
                            {canOrder && <button style={{background:"#ff4d6d15",border:"1px solid #ff4d6d44",color:"#ff4d6d",borderRadius:4,padding:"3px 8px",fontSize:9,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setConfirmDel(o)}>🗑 Delete</button>}
                          </div>
                        </td>
                      </tr>
                      {expandId===o.id && (
                        <tr>
                          <td colSpan={8} style={{...S.td,background:"#07111e",padding:16}}>
                            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
                              {[
                                ["Wafer Size",o.waferSize||"—"],["S/P Config",o.spConfig||"—"],["No. Wafers",o.waferQty||"—"],
                                ["Vf Range",o.vfMin&&o.vfMax?o.vfMin+"V – "+o.vfMax+"V":"—"],
                                ["Iv Range",o.ivMin&&o.ivMax?o.ivMin+" – "+o.ivMax+" mcd":"—"],
                                ["CCT",o.cct||"—"],
                                ["Customer BINs",(o.customerBins||[]).join(", ")||"—"],
                                ["Target Yield",o.targetYieldPct+"%"],
                                ["DB Machines",(o.assignedMachines||[]).filter(m=>m.startsWith("DB")).join(", ")||"Not assigned"],
                                ["WB Machines",(o.assignedMachines||[]).filter(m=>m.startsWith("WB")).join(", ")||"Not assigned"],
                                ["Dispensing",(o.assignedMachines||[]).filter(m=>m.startsWith("DISP")).join(", ")||"Not assigned"],
                                ["Sorting",(o.assignedMachines||[]).filter(m=>m.startsWith("SORT")).join(", ")||"Not assigned"],
                                ["Taping",(o.assignedMachines||[]).filter(m=>m.startsWith("TAP")).join(", ")||"Not assigned"],
                                ["Created By",o.createdBy||"—"],["Assigned By",o.assignedBy||"—"],
                                ["Notes",o.notes||"—"],
                              ].map(([l,v])=>(
                                <div key={l} style={{background:"#0d1f2f",border:"1px solid #1e3347",borderRadius:6,padding:"8px 12px"}}>
                                  <div style={{fontSize:9,color:"#5a7a8a",letterSpacing:1.5,marginBottom:3}}>{l.toUpperCase()}</div>
                                  <div style={{fontSize:12,color:"#c8dae8"}}>{v}</div>
                                </div>
                              ))}
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </Card>
    </div>
  );
}

// ============================================================
// MACHINE ASSIGNMENT TAB
// ============================================================
function MachineAssignmentTab({ db, persist_order, currentUser }) {
  const { useState } = React;
  const [orderId, setOrderId] = useState("");
  const [selMachines, setSelMachines] = useState({db:[],wb:[],disp:[],sort:[],tape:[]});
  const [flash, setFlash] = useState(null);
  const [saving, setSaving] = useState(false);

  const DB_LIST   = ["DB1","DB2","DB3NL","DB3NR","DB4NL","DB4NR","DB5","DB5NL","DB5NR","DB6"];
  const DB_UPH    = {DB1:12500,DB2:12500,DB3NL:16000,DB3NR:16000,DB4NL:16000,DB4NR:16000,DB5:10000,DB5NL:16000,DB5NR:16000,DB6:10000};
  const WB_LIST   = ["WB1","WB2","WB3","WB4","WB5","WB6","WB7"];
  const DISP_LIST = ["DISP-1","DISP-2"];
  const SORT_LIST = ["SORT-1","SORT-2","SORT-3","SORT-4","SORT-5"];
  const TAPE_LIST = ["TAPE-1","TAPE-2","TAPE-3","TAPE-4"];

  const activeOrders = db.productionOrders.filter(o=>o.status===ORDER_STATUS.PENDING||o.status===ORDER_STATUS.IN_PROGRESS);
  const selOrder = db.productionOrders.find(o=>o.id===orderId);

  function toggle(type, m, max) {
    setSelMachines(s=>{
      const cur = s[type];
      if (cur.includes(m)) return {...s,[type]:cur.filter(x=>x!==m)};
      if (cur.length>=max) return s;
      return {...s,[type]:[...cur,m]};
    });
  }

  function loadExisting(id) {
    setOrderId(id);
    const o = db.productionOrders.find(x=>x.id===id);
    if (!o) { setSelMachines({db:[],wb:[],disp:[],sort:[],tape:[]}); return; }
    const all = o.assignedMachines||[];
    setSelMachines({
      db: all.filter(m=>DB_LIST.includes(m)),
      wb: all.filter(m=>WB_LIST.includes(m)),
      disp: all.filter(m=>DISP_LIST.includes(m)),
      sort: all.filter(m=>SORT_LIST.includes(m)),
      tape: all.filter(m=>TAPE_LIST.includes(m)),
    });
  }

  function calcDuration() {
    if (!selOrder || selMachines.db.length===0) return null;
    const qty = Number(selOrder.targetQty)||0;
    const dbUPH = selMachines.db.reduce((s,m)=>s+(DB_UPH[m]||10000),0);
    const dbwbHrs = dbUPH>0 ? qty/dbUPH : 0;
    const dispMachines = selMachines.disp.length||1;
    const dispHrs = qty/(75000*dispMachines);
    const sortMachines = selMachines.sort.length||1;
    const sortHrs = qty/(sortMachines*20000);
    const tapeMachines = selMachines.tape.length||1;
    const tapeHrs = (qty/REEL_SIZE)/(tapeMachines*2);
    const totalHrs = Math.max(dbwbHrs,dispHrs) + sortHrs + tapeHrs;
    const shifts = totalHrs/7;
    return {
      dbwbHrs:dbwbHrs.toFixed(1), dispHrs:dispHrs.toFixed(1),
      sortHrs:sortHrs.toFixed(1), tapeHrs:tapeHrs.toFixed(1),
      totalHrs:totalHrs.toFixed(1), shifts:shifts.toFixed(1)
    };
  }

  async function assign() {
    const allMachines = [...selMachines.db,...selMachines.wb,...selMachines.disp,...selMachines.sort,...selMachines.tape];
    if (!orderId || allMachines.length===0){ setFlash({t:"error",m:"Select an order and at least one machine."}); return; }
    setSaving(true);
    try {
      await persist_order({...selOrder, assignedMachines:allMachines, assignedBy:currentUser.id, assignedAt:new Date().toISOString(), status:ORDER_STATUS.IN_PROGRESS});
      setFlash({t:"success",m:"✓ Machines assigned. Order is now In Progress."}); setTimeout(()=>setFlash(null),3000);
    } catch(e){ setFlash({t:"error",m:"Failed: "+e.message}); }
    setSaving(false);
  }

  const est = calcDuration();

  function MachineGroup({label, list, type, max, uphMap}) {
    const sel = selMachines[type];
    return (
      <div style={{marginBottom:16}}>
        <div style={{fontSize:10,fontWeight:700,color:"#00e5a0",letterSpacing:1.5,marginBottom:8}}>
          {label} <span style={{color:"#5a7a8a",fontWeight:400}}>({sel.length}/{max} selected)</span>
        </div>
        <div style={S.chips}>
          {list.map(m=>(
            <button key={m}
              style={{...S.chip,...(sel.includes(m)?S.chipOn:{}),opacity:(!sel.includes(m)&&sel.length>=max)?0.4:1}}
              onClick={()=>toggle(type,m,max)}
              disabled={!sel.includes(m)&&sel.length>=max}>
              {m}{uphMap&&uphMap[m]?<><br/><span style={{fontSize:9,opacity:0.7}}>{(uphMap[m]).toLocaleString()} UPH</span></>:null}
            </button>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div>
      <PageTitle>⚙ Machine Assignment</PageTitle>
      {flash && <Flash type={flash.t}>{flash.m}</Flash>}

      <Card title="Assign Machines to Order">
        <Field label="Select Production Order">
          <select style={S.select} value={orderId} onChange={e=>loadExisting(e.target.value)}>
            <option value="">— Select order —</option>
            {activeOrders.map(o=><option key={o.id} value={o.id}>{o.orderRef} | {o.customer} | {o.ledType} | Qty: {Number(o.targetQty).toLocaleString()}</option>)}
          </select>
        </Field>

        {selOrder && (
          <div style={{background:"#07111e",border:"1px solid #1e3347",borderRadius:8,padding:14,marginBottom:20}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
              {[["Customer",selOrder.customer],["LED Type",selOrder.ledType],
                ["Target Qty",Number(selOrder.targetQty).toLocaleString()],
                ["Due Date",selOrder.dueDate],["Priority",selOrder.priority],
                ["Customer BINs",(selOrder.customerBins||[]).join(", ")||"—"]
              ].map(([l,v])=>(
                <div key={l}><div style={{fontSize:9,color:"#5a7a8a",letterSpacing:1.5}}>{l.toUpperCase()}</div><div style={{fontSize:12,color:"#c8dae8",marginTop:3}}>{v}</div></div>
              ))}
            </div>
          </div>
        )}

        <MachineGroup label="Die Bonders" list={DB_LIST} type="db" max={7} uphMap={DB_UPH} />
        <MachineGroup label="Wire Bonders" list={WB_LIST} type="wb" max={7} uphMap={null} />
        <MachineGroup label="Dispensing Machines" list={DISP_LIST} type="disp" max={2} uphMap={null} />
        <MachineGroup label="Sorting Machines" list={SORT_LIST} type="sort" max={5} uphMap={null} />
        <MachineGroup label="Taping Machines" list={TAPE_LIST} type="tape" max={4} uphMap={null} />

        {est && (
          <div style={{background:"#00e5a008",border:"1px solid #00e5a020",borderRadius:8,padding:16,marginBottom:16}}>
            <div style={{fontSize:10,fontWeight:700,color:"#00e5a0",letterSpacing:1.5,marginBottom:12}}>ESTIMATED PRODUCTION DURATION</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:10}}>
              {[["DB / WB",est.dbwbHrs+" hrs"],["Dispensing",est.dispHrs+" hrs"],["Sorting",est.sortHrs+" hrs"],["Taping",est.tapeHrs+" hrs"],["Total",est.totalHrs+" hrs"],["Approx. Shifts",est.shifts+" shifts"]].map(([l,v])=>(
                <div key={l} style={{textAlign:"center"}}>
                  <div style={{fontSize:9,color:"#5a7a8a",letterSpacing:1.5}}>{l.toUpperCase()}</div>
                  <div style={{fontSize:18,fontWeight:700,color:"#eaf4fc",marginTop:4}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{textAlign:"right"}}>
          <button style={S.btnPrimary} onClick={assign} disabled={saving||!orderId}>{saving?"SAVING...":"SAVE ASSIGNMENTS →"}</button>
        </div>
      </Card>

      <Card title="Current Machine Assignments (In Progress)">
        {db.productionOrders.filter(o=>o.status===ORDER_STATUS.IN_PROGRESS).length===0
          ?<Empty text="No orders currently in progress." />:(
          <div style={S.tableWrap}>
            <table style={S.tbl}>
              <thead><tr>{["Order Ref","Customer","LED Type","Target Qty","DB","WB","Dispensing","Sorting","Taping","Due Date"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
              <tbody>
                {db.productionOrders.filter(o=>o.status===ORDER_STATUS.IN_PROGRESS).map(o=>{
                  const all = o.assignedMachines||[];
                  return (
                    <tr key={o.id}>
                      <td style={{...S.td,color:"#00e5a0",fontWeight:700}}>{o.orderRef}</td>
                      <td style={S.td}>{o.customer}</td>
                      <td style={S.td}>{o.ledType}</td>
                      <td style={{...S.td,textAlign:"right"}}>{Number(o.targetQty).toLocaleString()}</td>
                      <td style={S.td}>{all.filter(m=>DB_LIST.includes(m)).join(", ")||"—"}</td>
                      <td style={S.td}>{all.filter(m=>WB_LIST.includes(m)).join(", ")||"—"}</td>
                      <td style={S.td}>{all.filter(m=>DISP_LIST.includes(m)).join(", ")||"—"}</td>
                      <td style={S.td}>{all.filter(m=>SORT_LIST.includes(m)).join(", ")||"—"}</td>
                      <td style={S.td}>{all.filter(m=>TAPE_LIST.includes(m)).join(", ")||"—"}</td>
                      <td style={{...S.td,color:new Date(o.dueDate)<new Date()?"#ff4d6d":"#c8dae8"}}>{o.dueDate}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </Card>
    </div>
  );
}
